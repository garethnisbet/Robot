replicaCount: 1

image:
  repository: ghcr.io/ndf61257/robot-visualisation
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: robots.diamond.ac.uk
  annotations: {}
  tls: true

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi
