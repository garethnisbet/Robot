<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meca500 Robot - Three.js FK/IK Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', monospace; }
  canvas { display: block; }
  #panel {
    position: absolute; top: 10px; right: 10px; width: 260px;
    max-height: calc(100vh - 20px); overflow-y: auto;
    background: rgba(10,10,30,0.85); color: #ccc; padding: 14px;
    border-radius: 8px; backdrop-filter: blur(8px);
    border: 1px solid rgba(100,100,200,0.2);
  }
  #panel h2 { font-size: 14px; margin-bottom: 10px; color: #aac; }
  .slider-row { margin-bottom: 8px; }
  .slider-row label {
    display: flex; justify-content: space-between; font-size: 12px;
    margin-bottom: 2px; color: #99a;
  }
  .slider-row label span { color: #8cf; font-weight: bold; }
  input[type="range"] {
    width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
    background: #2a2a4a; border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #6688ff; border-radius: 50%; cursor: pointer;
  }
  #info {
    position: absolute; bottom: 10px; left: 10px; color: #667;
    font-size: 11px; font-family: monospace;
  }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #aac; font-size: 16px; font-family: monospace;
  }
  button {
    width: 100%; padding: 6px; margin-top: 6px; background: #334;
    color: #aac; border: 1px solid #446; border-radius: 4px; cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #445; }
  button.active { background: #448; border-color: #66f; color: #fff; }
  #ee-info {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #334;
    font-size: 11px; color: #889;
  }
  #ee-info span { color: #8cf; }
  .slider-row label span { cursor: text; }
  .val-input {
    width: 54px; background: rgba(0,0,40,0.6); border: 1px solid #66f;
    color: #8cf; font-weight: bold; font-size: 12px; font-family: monospace;
    text-align: right; outline: none; padding: 0 3px; border-radius: 2px;
  }
  .mesh-label {
    color: #fff; font-size: 11px; font-family: monospace;
    background: rgba(0,0,0,0.6); padding: 1px 5px; border-radius: 3px;
    white-space: nowrap; pointer-events: none;
  }
  #stl-list { margin-top: 6px; max-height: 150px; overflow-y: auto; }
  .stl-item {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: #aac; padding: 3px 0;
    border-bottom: 1px solid rgba(100,100,200,0.1);
  }
  .stl-item .stl-color {
    width: 12px; height: 12px; border-radius: 2px; margin-right: 6px;
    border: 1px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0;
  }
  .stl-item .stl-name {
    flex: 1; cursor: text; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .stl-item .stl-vis, .stl-item .stl-rm {
    background: none; border: none; color: #889; cursor: pointer;
    font-size: 11px; padding: 0 3px; width: auto; margin: 0;
  }
  .stl-item .stl-vis:hover, .stl-item .stl-rm:hover { color: #fff; }
  .stl-item.selected { background: rgba(100,140,255,0.15); border-radius: 3px; }
  .stl-item .stl-name.selected { color: #8cf; font-weight: bold; }
  #stl-mode {
    display: none; margin-top: 6px; font-size: 11px; color: #889;
    padding: 6px 0 0;
    border-top: 1px solid #334;
  }
  #stl-mode .stl-mode-name {
    display: block; margin-bottom: 5px; color: #8cf;
    font-size: 12px; font-weight: bold;
  }
  #stl-mode .stl-mode-buttons {
    display: flex; gap: 4px;
  }
  #stl-mode .stl-mode-buttons button {
    flex: 1; width: auto; padding: 5px 0; margin: 0;
    font-size: 11px; text-align: center;
  }
  #stl-parent { margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  #stl-parent label { font-size: 11px; color: #889; white-space: nowrap; }
  #stlParentSelect {
    flex: 1; background: #223; color: #aac; border: 1px solid #446;
    border-radius: 3px; font-size: 11px; padding: 2px 4px; outline: none;
  }
  #collision-info {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid #334;
    font-size: 11px; color: #889;
  }
  #collision-info.hit { color: #f66; }
  #collision-info .collision-pair {
    color: #fa8; font-size: 10px; display: block;
    padding-left: 8px; margin-top: 2px;
  }
  #ws-status {
    position: absolute; top: 10px; left: 10px;
    font-size: 11px; font-family: monospace; color: #889;
    background: rgba(10,10,30,0.85); padding: 6px 10px;
    border-radius: 6px; backdrop-filter: blur(8px);
    border: 1px solid rgba(100,100,200,0.2);
  }
  #ws-status .dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle;
  }
  #ws-status .dot.off { background: #555; }
  #ws-status .dot.on { background: #4f4; box-shadow: 0 0 4px #4f4; }
  #ws-status .dot.err { background: #f44; box-shadow: 0 0 4px #f44; }
  #nav-gizmo {
    position: absolute; top: 45px; left: 10px;
    width: 110px; height: 110px; cursor: default;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div id="loading">Loading robot model...</div>
<canvas id="nav-gizmo"></canvas>
<div id="ws-status"><span class="dot off" id="ws-dot"></span><span id="ws-text">API: not connected</span></div>
<div id="panel">
  <div id="model-selector" style="margin-bottom:10px;">
    <select id="modelSelect" style="width:100%;background:#223;color:#aac;border:1px solid #446;border-radius:4px;font-size:12px;padding:4px 6px;outline:none;cursor:pointer;">
    </select>
  </div>
  <h2>Joint Angles (deg)</h2>
  <div id="joint-sliders"></div>
  <button id="resetBtn">Reset to Home</button>
  <button id="demoBtn" style="display:none;">Demo Pose</button>
  <button id="ikBtn">IK Mode: OFF</button>
  <button id="labelBtn">Labels: OFF</button>
  <button id="chainBtn">Chain: OFF</button>
  <button id="orthoBtn">Ortho: OFF</button>
  <button id="collisionBtn">Collision: OFF</button>
  <button id="stlBtn">Import Mesh (STL / OBJ / PLY / GLB)</button>
  <input type="file" id="stlFile" accept=".stl,.obj,.ply,.glb,.gltf" multiple style="display:none">
  <div style="display:flex; gap:4px; margin-top:4px;">
    <button id="addCubeBtn" style="flex:1; margin:0;">Cube</button>
    <button id="addSphereBtn" style="flex:1; margin:0;">Sphere</button>
    <button id="addCylinderBtn" style="flex:1; margin:0;">Cylinder</button>
  </div>
  <div id="stl-list"></div>
  <div id="stl-mode">
    <span id="stl-sel-name" class="stl-mode-name"></span>
    <div class="stl-mode-buttons">
      <button id="stlModeT" class="active">Move</button>
      <button id="stlModeR">Rotate</button>
      <button id="stlModeS">Scale</button>
      <button id="stlDeselect">Deselect</button>
    </div>
    <div style="display:flex; gap:4px; margin-top:5px;">
      <button id="stlResetRot" style="flex:1; width:auto; padding:4px 0; margin:0; font-size:11px;">Reset Rotation</button>
      <button id="stlResetScale" style="flex:1; width:auto; padding:4px 0; margin:0; font-size:11px;">Reset Scale</button>
    </div>
    <div id="stl-lock-aspect" style="display:flex; align-items:center; gap:5px; margin-top:5px;">
      <input type="checkbox" id="lockAspectCb" style="width:auto; margin:0;">
      <label for="lockAspectCb" style="font-size:11px; color:#889; cursor:pointer; white-space:nowrap;">Lock aspect ratio</label>
    </div>
    <div id="stl-parent">
      <label>Parent:</label>
      <select id="stlParentSelect">
        <option value="">World</option>
      </select>
    </div>
  </div>
  <div id="collision-info" style="display:none;">Collisions: <span id="collision-text">none</span></div>
  <div id="ik-panel" style="display:none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #334;">
    <h2 style="color:#5b5;">IK Target (mm)</h2>
    <div class="slider-row">
      <label>X <span id="ikvx">190</span></label>
      <input type="range" id="ikx" min="-400" max="400" value="190" step="1">
    </div>
    <div class="slider-row">
      <label>Y <span id="ikvy">0</span></label>
      <input type="range" id="iky" min="-400" max="400" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>Z <span id="ikvz">308</span></label>
      <input type="range" id="ikz" min="-100" max="500" value="308" step="1">
    </div>
    <h2 style="color:#5b5; margin-top:8px;">IK Orientation (deg)</h2>
    <div class="slider-row">
      <label>&alpha; (Rz) <span id="ikva">0</span></label>
      <input type="range" id="ika" min="-180" max="180" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>&beta; (Ry) <span id="ikvb">0</span></label>
      <input type="range" id="ikb" min="-180" max="180" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>&gamma; (Rx) <span id="ikvc">0</span></label>
      <input type="range" id="ikc" min="-180" max="180" value="0" step="1">
    </div>
  </div>
  <div id="ee-info">
    EE: <span id="eePos">-</span><br>
    Target: <span id="tgtPos">-</span><br>
    Error: <span id="ikErr">-</span>
  </div>
</div>
<div id="info">Scroll to zoom | Drag to orbit | Right-drag to pan | IK: drag the green sphere | Click STL to select, T=move R=rotate S=scale Esc=deselect</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
    "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.7.8?external=three"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { MeshBVH, acceleratedRaycast } from 'three-mesh-bvh';

// Patch Three.js Mesh to use BVH-accelerated raycasting
THREE.Mesh.prototype.raycast = acceleratedRaycast;

// ============================================================
// Load robot configuration
// ============================================================
const configParam = new URLSearchParams(window.location.search).get('config') || 'robot_config.json';
const config = await fetch(configParam).then(r => r.json());
const numJoints = config.joints.length;
// API sign-flip: joints whose config axis is negated report/accept negated angles
const apiSign = config.joints.map(j =>
  (j.apiSign !== undefined) ? j.apiSign : 1
);
document.title = config.name + ' - FK/IK Viewer';

// Populate model selector
{
  const select = document.getElementById('modelSelect');
  const configFiles = ['robot_config.json', 'i16_config.json'];
  const configs = await Promise.all(configFiles.map(async f => {
    try { const c = await fetch(f).then(r => r.ok ? r.json() : null); return c ? { file: f, name: c.name } : null; }
    catch { return null; }
  }));
  for (const c of configs.filter(Boolean)) {
    const opt = document.createElement('option');
    opt.value = c.file;
    opt.textContent = c.name;
    if (c.file === configParam) opt.selected = true;
    select.appendChild(opt);
  }
  select.addEventListener('change', () => {
    window.location.search = '?config=' + encodeURIComponent(select.value);
  });
}

// Generate joint sliders from config (skip fixed joints)
const sliderContainer = document.getElementById('joint-sliders');
const sliderJointMap = []; // maps slider index (1-based) to joint index
// Rename physical theta/phi to ktheta/kphi for kappa diffractometers
const kappaSliderNames = {};
{
  const ki = config.joints.findIndex(j => j.name === 'kappa');
  const ti = config.joints.findIndex(j => j.name === 'theta');
  const pi = config.joints.findIndex(j => j.name === 'phi');
  if (ki >= 0 && ti >= 0 && pi >= 0) {
    kappaSliderNames[ti] = 'ktheta';
    kappaSliderNames[pi] = 'kphi';
  }
}
for (let i = 0; i < numJoints; i++) {
  const j = config.joints[i];
  if (j.fixed) continue;
  sliderJointMap.push(i);
  const si = sliderJointMap.length; // 1-based slider index
  const displayName = kappaSliderNames[i] || j.name;
  const div = document.createElement('div');
  div.className = 'slider-row';
  div.innerHTML = `<label>${displayName} <span id="v${si}">0</span></label>` +
    `<input type="range" id="j${si}" min="${j.limits[0]}" max="${j.limits[1]}" value="0" step="0.5">`;
  sliderContainer.appendChild(div);
}
const numSliders = sliderJointMap.length;
const deg2rad = Math.PI / 180;
const rad2deg = 180 / Math.PI;

// ============================================================
// Kappa geometry detection — virtual chi angle
// ============================================================
// Detect kappa diffractometer by looking for theta, kappa, phi joints
const kappaJointIdx = config.joints.findIndex(j => j.name === 'kappa');
const thetaJointIdx = config.joints.findIndex(j => j.name === 'theta');
const phiJointIdx = config.joints.findIndex(j => j.name === 'phi');
const isKappaGeometry = kappaJointIdx >= 0 && thetaJointIdx >= 0 && phiJointIdx >= 0;

// Kappa geometry state — populated after FK chain is built
let kappaAlpha = 0;
let kappaSignPositive = false; // toggle: true = κ+, false = κ−
// Numerically precomputed compensation lookup table: kappaDeg → { theta, phi }
let kappaCompTable = null; // array of { kappa, chi, theta, phi }
let kappaChiAxis = null;   // THREE.Vector3 — chi tilt axis in world frame
let kappaHomeQuat = null;     // THREE.Quaternion — phi frame orientation at home

// Kappa ↔ Euler angle conversion (depends only on alpha)
function kappaToEuler(kappaDeg) {
  const kappaRad = kappaDeg * deg2rad;
  const chi = 2 * Math.asin(Math.sin(kappaRad / 2) * Math.sin(kappaAlpha));
  return { chi: chi * rad2deg, kappa: kappaDeg };
}

function eulerToKappa(chiDeg) {
  const chiRad = chiDeg * deg2rad;
  const sinHalfChi = Math.sin(chiRad / 2);
  const sinAlpha = Math.sin(kappaAlpha);
  if (Math.abs(sinHalfChi / sinAlpha) > 1) return null;
  const kappaRad = 2 * Math.asin(sinHalfChi / sinAlpha);
  return { kappa: kappaRad * rad2deg, chi: chiDeg };
}

// Interpolate compensation from a lookup table (binary search + lerp)
function getCompensation(kappaDeg) {
  if (!kappaCompTable || kappaCompTable.length === 0) return { theta: 0, phi: 0 };
  const table = kappaCompTable;
  if (kappaDeg <= table[0].kappa) return { theta: table[0].theta, phi: table[0].phi };
  if (kappaDeg >= table[table.length-1].kappa) return { theta: table[table.length-1].theta, phi: table[table.length-1].phi };
  let lo = 0, hi = table.length - 1;
  while (hi - lo > 1) { const m = (lo + hi) >> 1; if (table[m].kappa <= kappaDeg) lo = m; else hi = m; }
  const t = (kappaDeg - table[lo].kappa) / (table[hi].kappa - table[lo].kappa);
  return {
    theta: table[lo].theta * (1-t) + table[hi].theta * t,
    phi: table[lo].phi * (1-t) + table[hi].phi * t,
  };
}

// Update virtual angle sliders from current motor angles
function updateVirtualAngles() {
  if (!isKappaGeometry || !kappaCompTable) return;
  // In κ− mode the physical angles are the negation of the κ+ solution,
  // so un-negate before applying the normal compensation inverse.
  const sign = kappaSignPositive ? 1 : -1;
  const kappaDeg = sign * jointAngles[kappaJointIdx] * rad2deg;
  const chiDeg = kappaToEuler(kappaDeg).chi;
  const comp = getCompensation(kappaDeg);
  let thetaDeg = sign * jointAngles[thetaJointIdx] * rad2deg - comp.theta;
  let phiDeg = sign * jointAngles[phiJointIdx] * rad2deg - comp.phi;

  // Snap near-zero values to exactly 0 to avoid -0.0 display flicker
  const snap = v => Math.abs(v) < 0.05 ? 0 : v;

  document.getElementById('chiSlider').value = chiDeg;
  document.getElementById('vchi').textContent = snap(chiDeg).toFixed(1);
  document.getElementById('vthetaSlider').value = thetaDeg;
  document.getElementById('vvtheta').textContent = snap(thetaDeg).toFixed(1);
  document.getElementById('vphiSlider').value = phiDeg;
  document.getElementById('vvphi').textContent = snap(phiDeg).toFixed(1);
}

if (isKappaGeometry) {
  // Slider limits
  const thetaLimits = config.joints[thetaJointIdx].limits;
  const phiLimits = config.joints[phiJointIdx].limits;

  // Add virtual angles section (chi limits set to placeholder, updated after FK init)
  const virtDiv = document.createElement('div');
  virtDiv.id = 'virtual-angles';
  virtDiv.style.cssText = 'margin-top:8px; padding-top:8px; border-top:1px solid #534;';
  virtDiv.innerHTML =
    '<h2 style="color:#c95;">Virtual Angles (deg)</h2>' +
    '<div class="slider-row">' +
      '<label>\u03B8 (theta) <span id="vvtheta">0.0</span></label>' +
      '<input type="range" id="vthetaSlider" min="' + thetaLimits[0] + '" max="' + thetaLimits[1] + '" value="0" step="0.5">' +
    '</div>' +
    '<div class="slider-row">' +
      '<label>\u03C7 (chi) <span id="vchi">0.0</span></label>' +
      '<input type="range" id="chiSlider" min="-180" max="180" value="0" step="0.5">' +
    '</div>' +
    '<div class="slider-row">' +
      '<label>\u03C6 (phi) <span id="vvphi">0.0</span></label>' +
      '<input type="range" id="vphiSlider" min="' + phiLimits[0] + '" max="' + phiLimits[1] + '" value="0" step="0.5">' +
    '</div>' +
    '<button id="kappaSignBtn">\u03BA Sign: \u2212</button>';
  sliderContainer.parentNode.insertBefore(virtDiv, sliderContainer.nextSibling);
}

// Populate parent link dropdown from config
const parentSelect = document.getElementById('stlParentSelect');
for (const link of config.links) {
  const opt = document.createElement('option');
  opt.value = link.name;
  opt.textContent = `${link.name} \u2013 ${link.label}`;
  parentSelect.appendChild(opt);
}

// ============================================================
// Scene
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3a);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.001, 50);
camera.position.set(0.45, 0.30, 0.40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.target.set(0, 0.15, 0);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.update();

// Orthographic camera (created once, activated on toggle)
const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.001, 50);
let activeCamera = camera;
let orthoOn = false;

function updateOrthoFrustum() {
  const dist = orthoCamera.position.distanceTo(orbitControls.target);
  const halfH = Math.tan(camera.fov * Math.PI / 360) * dist;
  const aspect = innerWidth / innerHeight;
  orthoCamera.left = -halfH * aspect; orthoCamera.right = halfH * aspect;
  orthoCamera.top  =  halfH;          orthoCamera.bottom = -halfH;
  orthoCamera.updateProjectionMatrix();
}

function setOrtho(on) {
  orthoOn = on;
  document.getElementById('orthoBtn').textContent = `Ortho: ${on ? 'ON' : 'OFF'}`;
  document.getElementById('orthoBtn').classList.toggle('active', on);
  if (on) {
    orthoCamera.position.copy(camera.position);
    orthoCamera.quaternion.copy(camera.quaternion);
    orthoCamera.up.copy(camera.up);
    updateOrthoFrustum();
    activeCamera = orthoCamera;
  } else {
    camera.position.copy(orthoCamera.position);
    camera.quaternion.copy(orthoCamera.quaternion);
    camera.up.copy(orthoCamera.up);
    activeCamera = camera;
  }
  orbitControls.object = activeCamera;
  transformControls.camera = activeCamera;
  stlTransformControls.camera = activeCamera;
  orbitControls.update();
}

// ============================================================
// Navigation gizmo (Blender-style, Canvas 2D)
// ============================================================
const navCanvas = document.getElementById('nav-gizmo');
const NAV_SIZE = 110;
navCanvas.width  = Math.round(NAV_SIZE * devicePixelRatio);
navCanvas.height = Math.round(NAV_SIZE * devicePixelRatio);
const navCtx = navCanvas.getContext('2d');
navCtx.scale(devicePixelRatio, devicePixelRatio);

// Axis definitions  [id, world-dir, sphere-color, label, snap-up-vector]
const NAV_AXES = [
  { id:'x+', dir:new THREE.Vector3( 1, 0, 0), color:'#ff4455', label:'X', r:11, up:new THREE.Vector3(0,1,0) },
  { id:'y+', dir:new THREE.Vector3( 0, 1, 0), color:'#4499ff', label:'Z', r:11, up:new THREE.Vector3(0,0,-1) },
  { id:'z+', dir:new THREE.Vector3( 0, 0, 1), color:'#55dd55', label:'Y', r:11, up:new THREE.Vector3(0,1,0) },
  { id:'x-', dir:new THREE.Vector3(-1, 0, 0), color:'#882233', label:'',  r: 8, up:new THREE.Vector3(0,1,0) },
  { id:'y-', dir:new THREE.Vector3( 0,-1, 0), color:'#224488', label:'',  r: 8, up:new THREE.Vector3(0,0,1)  },
  { id:'z-', dir:new THREE.Vector3( 0, 0,-1), color:'#226622', label:'',  r: 8, up:new THREE.Vector3(0,1,0) },
];

// Project a world-space unit direction into 2D gizmo coords.
// We apply the INVERSE of the main camera quaternion so the dots
// move as the camera orbits.
const _navQ = new THREE.Quaternion();
const _navV = new THREE.Vector3();
function navProject(dir) {
  _navQ.copy(activeCamera.quaternion).invert();
  _navV.copy(dir).applyQuaternion(_navQ);
  const cx = NAV_SIZE / 2, cy = NAV_SIZE / 2;
  const scale = NAV_SIZE / 2 - 16;
  return { x: cx + _navV.x * scale, y: cy - _navV.y * scale, z: _navV.z };
}

let navHovered = null;

function renderNavGizmo() {
  const ctx = navCtx;
  const S = NAV_SIZE;
  ctx.clearRect(0, 0, S, S);

  // Background circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(S/2, S/2, S/2 - 1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(20,20,40,0.55)';
  ctx.fill();
  ctx.restore();

  // Compute projected positions and sort back-to-front
  const items = NAV_AXES.map(ax => ({ ax, ...navProject(ax.dir) }));
  items.sort((a, b) => a.z - b.z);

  // Draw axis lines (behind dots)
  for (const item of items) {
    if (!item.ax.id.endsWith('+')) continue;
    const neg = items.find(i => i.ax.id === item.ax.id.replace('+','-'));
    if (!neg) continue;
    ctx.beginPath();
    ctx.moveTo(neg.x, neg.y);
    ctx.lineTo(item.x, item.y);
    ctx.strokeStyle = 'rgba(180,180,180,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Draw dots
  for (const item of items) {
    const { ax, x, y, z } = item;
    // Depth-based alpha: 0.45 at back, 1.0 at front
    const alpha = 0.45 + 0.55 * ((z + 1) / 2);
    const hovered = navHovered === ax.id;
    const r = ax.r + (hovered ? 2 : 0);

    // Sphere fill
    const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
    const base = hexAlpha(ax.color, alpha);
    const bright = hexAlpha(ax.color, Math.min(1, alpha + 0.3));
    grad.addColorStop(0, bright);
    grad.addColorStop(1, base);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Hover ring
    if (hovered) {
      ctx.beginPath();
      ctx.arc(x, y, r + 1, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label
    if (ax.label) {
      ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha + 0.1)})`;
      ctx.font = `bold ${r - 1}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ax.label, x, y + 0.5);
    }
  }
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

// Hit-test: returns axis id under (mx,my) in CSS pixels, or null
function navHitTest(mx, my) {
  const items = NAV_AXES.map(ax => ({ ax, ...navProject(ax.dir) }));
  items.sort((a, b) => b.z - a.z); // front-to-back for click priority
  for (const item of items) {
    const dx = mx - item.x, dy = my - item.y;
    if (Math.sqrt(dx*dx + dy*dy) <= item.ax.r + 3) return item.ax.id;
  }
  return null;
}

navCanvas.addEventListener('mousemove', (e) => {
  const rect = navCanvas.getBoundingClientRect();
  const id = navHitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (id !== navHovered) { navHovered = id; navCanvas.style.cursor = id ? 'pointer' : 'default'; }
});

  // Find which axis changed most relative to its starting value

  const ry = s0.y !== 0 ? s.y / s0.y : 1;
  const rz = s0.z !== 0 ? s.z / s0.z : 1;
  const dx = Math.abs(rx - 1), dy = Math.abs(ry - 1), dz = Math.abs(rz - 1);
  const ratio = dx >= dy && dx >= dz ? rx : (dy >= dz ? ry : rz);
  s.set(s0.x * ratio, s0.y * ratio, s0.z * ratio);
});

const meshLabels = [];
const robotLinkMeshes = []; // { name, meshes: [Mesh], jointIdx }

const loader = new GLTFLoader();
loader.load(config.model, (gltf) => {
  document.getElementById('loading').style.display = 'none';
  const model = gltf.scene;

  const allNodes = {};
  model.traverse((child) => {
    if (child.name) allNodes[child.name] = child;
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  console.log('glTF nodes:', Object.keys(allNodes));

  const reparented = new Set();
  for (const [linkName, jointIdx] of Object.entries(linkToJoint)) {
    const node = allNodes[linkName];
    if (!node) {
      console.warn(`${linkName} not found in glTF`);
      continue;
    }

    node.updateWorldMatrix(true, false);
    const worldMat = node.matrixWorld.clone();
    node.removeFromParent();

    const target = jointRotGroups[jointIdx];
    target.updateWorldMatrix(true, false);
    const localMat = target.matrixWorld.clone().invert().multiply(worldMat);

    node.matrix.copy(localMat);
    node.matrix.decompose(node.position, node.quaternion, node.scale);
    target.add(node);

    reparented.add(linkName);
    node.traverse((c) => { if (c.name) reparented.add(c.name); });
  }

  // Remove hidden objects that were reparented as children of links
  const hideNames = ['Icosphere', 'Cross'];
  scene.traverse((child) => {
    if (child.name && hideNames.includes(child.name)) {
      child.removeFromParent();
    }
  });
  const hiddenNodes = new Set();
  model.traverse((child) => {
    if (child.name && hideNames.includes(child.name)) {
      child.traverse((c) => hiddenNodes.add(c));
    }
  });
  const statics = [];
  model.traverse((child) => {
    if (child.isMesh && !reparented.has(child.name) && !hiddenNodes.has(child)) {
      statics.push(child);
    }
  });
  for (const mesh of statics) {
    mesh.updateWorldMatrix(true, false);
    const wm = mesh.matrixWorld.clone();
    mesh.removeFromParent();
    scene.add(mesh);
    mesh.matrix.copy(wm);
    mesh.matrix.decompose(mesh.position, mesh.quaternion, mesh.scale);
  }

  // Create labels for all named mesh nodes (links + statics)
  function createLabel(name, parentObj) {
    const div = document.createElement('div');
    div.className = 'mesh-label';
    div.textContent = name;
    const label = new CSS2DObject(div);
    label.visible = false;
    // Position label at the bounding box center
    const box = new THREE.Box3().setFromObject(parentObj);
    const center = box.getCenter(new THREE.Vector3());
    parentObj.worldToLocal(center);
    label.position.copy(center);
    parentObj.add(label);
    meshLabels.push(label);
  }

  for (const [linkName, jointIdx] of Object.entries(linkToJoint)) {
    const node = allNodes[linkName];
    if (node) {
      createLabel(linkName, node);
      // Collect all meshes in this link for collision detection + build BVH
      const meshes = [];
      node.traverse((c) => {
        if (c.isMesh) {
          meshes.push(c);
          c.geometry.boundsTree = new MeshBVH(c.geometry);
        }
      });
      if (meshes.length > 0) robotLinkMeshes.push({ name: linkName, meshes, jointIdx });
    }
  }
  for (const mesh of statics) {
    if (mesh.name) createLabel(mesh.name, mesh);
  }

  // Auto-fit camera to scene contents
  updateFK();
  const fitBox = new THREE.Box3();
  for (const grp of jointRotGroups) {
    grp.updateWorldMatrix(true, true);
    grp.traverse((child) => {
      if (child.isMesh) fitBox.expandByObject(child);
    });
  }
  for (const mesh of statics) {
    mesh.updateWorldMatrix(true, false);
    fitBox.expandByObject(mesh);
  }
  if (!fitBox.isEmpty()) {
    const fitCenter = fitBox.getCenter(new THREE.Vector3());
    const fitSize = fitBox.getSize(new THREE.Vector3());
    const maxDim = Math.max(fitSize.x, fitSize.y, fitSize.z);
    const fov = camera.fov * (Math.PI / 180);
    const fitDist = maxDim / (2 * Math.tan(fov / 2)) * 1.2;
    const direction = new THREE.Vector3(1, 0.6, 1).normalize();
    camera.position.copy(fitCenter).addScaledVector(direction, fitDist);
    orbitControls.target.copy(fitCenter);
    camera.updateProjectionMatrix();
    orbitControls.update();
  }

}, (progress) => {
  const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '?';
  document.getElementById('loading').textContent = `Loading... ${pct}%`;
}, (err) => {

});

// ============================================================
// Precompute kappa compensation lookup table from actual geometry
// ============================================================
if (isKappaGeometry) {
  scene.updateMatrixWorld(true);

  // Get world-frame rotation axes at home (all motors = 0)
  const thetaWorldAxis = getJointWorldAxis(thetaJointIdx);
  const kappaWorldAxis = getJointWorldAxis(kappaJointIdx);
  kappaAlpha = Math.acos(Math.min(1, Math.abs(thetaWorldAxis.dot(kappaWorldAxis))));

  // Chi tilt axis (perpendicular to both theta and kappa axes)
  kappaChiAxis = new THREE.Vector3().crossVectors(thetaWorldAxis, kappaWorldAxis).normalize();

  // Verify chiAxis direction: positive kappa should produce positive chi
  jointAngles[kappaJointIdx] = 0.05;
  updateFK(); scene.updateMatrixWorld(true);
  const testPhiAxis = getJointWorldAxis(phiJointIdx);
  jointAngles[kappaJointIdx] = 0;
  updateFK(); scene.updateMatrixWorld(true);
  const homePhiAxis = getJointWorldAxis(phiJointIdx);
  // Positive chi should tilt phi axis toward chiAxis × thetaAxis direction
  const expectedTilt = new THREE.Vector3().crossVectors(kappaChiAxis, homePhiAxis);
  if (testPhiAxis.dot(expectedTilt) < 0) kappaChiAxis.negate();

  // Record home orientation of the phi rotation frame
  kappaHomeQuat = new THREE.Quaternion();
  jointRotGroups[phiJointIdx].getWorldQuaternion(kappaHomeQuat);

  // Helper: measure orientation error as axis-angle vector
  function orientError(targetQuat) {
    const q = new THREE.Quaternion();
    jointRotGroups[phiJointIdx].getWorldQuaternion(q);
    const qErr = targetQuat.clone().conjugate().multiply(q);
    if (qErr.w < 0) { qErr.x = -qErr.x; qErr.y = -qErr.y; qErr.z = -qErr.z; qErr.w = -qErr.w; }
    const sh = Math.sqrt(qErr.x*qErr.x + qErr.y*qErr.y + qErr.z*qErr.z);
    if (sh < 1e-10) return [0, 0, 0];
    const a = 2 * Math.atan2(sh, qErr.w);
    return [qErr.x/sh * a, qErr.y/sh * a, qErr.z/sh * a];
  }

  // Build compensation lookup table from kappa=0 outward in both directions.
  // At kappa=0, theta and phi axes are collinear (Jacobian is singular),
  // so we start from the analytically known (0,0) center and sweep outward
  // where the axes separate and the Jacobian has full rank.
  const kappaLimits = config.joints[kappaJointIdx].limits;
  const HALF_STEPS = 75;
  const negEntries = []; // kappa < 0, built outward then reversed
  const posEntries = []; // kappa >= 0, built outward

  function solveCompEntry(kappaDeg, startTheta, startPhi) {
    const chiRad = 2 * Math.asin(Math.sin(kappaDeg * deg2rad / 2) * Math.sin(kappaAlpha));
    const targetQuat = new THREE.Quaternion().setFromAxisAngle(kappaChiAxis, chiRad).multiply(kappaHomeQuat);
    let tc = startTheta, pc = startPhi;
    for (let iter = 0; iter < 20; iter++) {
      jointAngles[kappaJointIdx] = kappaDeg * deg2rad;
      jointAngles[thetaJointIdx] = tc * deg2rad;
      jointAngles[phiJointIdx] = pc * deg2rad;
      updateFK(); scene.updateMatrixWorld(true);
      const err = orientError(targetQuat);
      const errNorm = Math.sqrt(err[0]*err[0] + err[1]*err[1] + err[2]*err[2]);
      if (errNorm < 1e-6) break;

      // Numerical Jacobian (3×2)
      const eps = 0.05;
      jointAngles[thetaJointIdx] = (tc + eps) * deg2rad;
      jointAngles[phiJointIdx] = pc * deg2rad;
      updateFK(); scene.updateMatrixWorld(true);
      const eT = orientError(targetQuat);

      jointAngles[thetaJointIdx] = tc * deg2rad;
      jointAngles[phiJointIdx] = (pc + eps) * deg2rad;
      updateFK(); scene.updateMatrixWorld(true);
      const eP = orientError(targetQuat);

      const j0 = [(eT[0]-err[0])/eps, (eT[1]-err[1])/eps, (eT[2]-err[2])/eps];
      const j1 = [(eP[0]-err[0])/eps, (eP[1]-err[1])/eps, (eP[2]-err[2])/eps];

      // Damped pseudo-inverse (JᵀJ + λI)⁻¹ Jᵀ err — regularisation
      // prevents blow-up when theta/phi axes are nearly collinear
      const lambda = 1e-4;
      const a = j0[0]*j0[0]+j0[1]*j0[1]+j0[2]*j0[2] + lambda;
      const b = j0[0]*j1[0]+j0[1]*j1[1]+j0[2]*j1[2];
      const c = j1[0]*j1[0]+j1[1]*j1[1]+j1[2]*j1[2] + lambda;
      const det = a*c - b*b;
      if (Math.abs(det) < 1e-20) break;

      const jte0 = j0[0]*err[0]+j0[1]*err[1]+j0[2]*err[2];
      const jte1 = j1[0]*err[0]+j1[1]*err[1]+j1[2]*err[2];

      tc -= (c*jte0 - b*jte1) / det;
      pc -= (-b*jte0 + a*jte1) / det;
    }
    return { kappa: kappaDeg, chi: chiRad * rad2deg, theta: tc, phi: pc };
  }

  // Center entry: analytically known — no compensation at home
  posEntries.push({ kappa: 0, chi: 0, theta: 0, phi: 0 });

  // Sweep positive kappa (0 → kappaMax)
  let pt = 0, pp = 0;
  for (let step = 1; step <= HALF_STEPS; step++) {
    const kappaDeg = kappaLimits[1] * step / HALF_STEPS;
    const entry = solveCompEntry(kappaDeg, pt, pp);
    posEntries.push(entry);
    pt = entry.theta; pp = entry.phi;
  }

  // Sweep negative kappa (0 → kappaMin)
  let nt = 0, np = 0;
  for (let step = 1; step <= HALF_STEPS; step++) {
    const kappaDeg = kappaLimits[0] * step / HALF_STEPS;
    const entry = solveCompEntry(kappaDeg, nt, np);
    negEntries.push(entry);
    nt = entry.theta; np = entry.phi;
  }

  // Merge: negative entries (reversed so ascending kappa) + positive entries
  kappaCompTable = negEntries.reverse().concat(posEntries);

  // Reset to home
  jointAngles[kappaJointIdx] = 0;
  jointAngles[thetaJointIdx] = 0;
  jointAngles[phiJointIdx] = 0;
  updateFK();

  // Update chi slider limits
  const chiMin = kappaCompTable[0].chi;
  const chiMax = kappaCompTable[kappaCompTable.length-1].chi;
  const chiSlider = document.getElementById('chiSlider');
  chiSlider.min = Math.min(chiMin, chiMax).toFixed(1);
  chiSlider.max = Math.max(chiMin, chiMax).toFixed(1);

  // Log chi=90 compensation for verification
  const test90 = eulerToKappa(90);
  if (test90) {
    const comp90 = getCompensation(test90.kappa);
    console.log(`Kappa geometry: α=${(kappaAlpha*rad2deg).toFixed(1)}°, chi=90° → kappa=${test90.kappa.toFixed(1)}°, ktheta=${comp90.theta.toFixed(1)}°, kphi=${comp90.phi.toFixed(1)}°`);
  }
}

// ============================================================
// IK solver — 6-DOF DLS (position + orientation)
// ============================================================
function getJointWorldAxis(i) {
  const worldQuat = new THREE.Quaternion();
  jointRestGroups[i].getWorldQuaternion(worldQuat);
  return jointAxes[i].clone().applyQuaternion(worldQuat).normalize();
}

function getJointWorldPosition(i) {
  jointRestGroups[i].updateWorldMatrix(true, false);
  return new THREE.Vector3().setFromMatrixPosition(jointRestGroups[i].matrixWorld);
}

function getEEWorldQuaternion() {
  eeMarker.updateWorldMatrix(true, false);
  return new THREE.Quaternion().setFromRotationMatrix(eeMarker.matrixWorld);
}

function orientationError(qTarget, qCurrent) {
  const qErr = qTarget.clone().multiply(qCurrent.clone().conjugate());
  if (qErr.w < 0) { qErr.x = -qErr.x; qErr.y = -qErr.y; qErr.z = -qErr.z; qErr.w = -qErr.w; }
  const sinHalf = Math.sqrt(qErr.x*qErr.x + qErr.y*qErr.y + qErr.z*qErr.z);
  if (sinHalf < 1e-8) return new THREE.Vector3(0, 0, 0);
  const angle = 2 * Math.atan2(sinHalf, qErr.w);
  return new THREE.Vector3(qErr.x/sinHalf * angle, qErr.y/sinHalf * angle, qErr.z/sinHalf * angle);
}

function solveIK(targetPos, targetQuat, maxIter = 20, tolerance = 0.0005) {
  const lambda = 0.5;
  const oriWeight = 0.3;  // scale orientation vs position importance

  for (let iter = 0; iter < maxIter; iter++) {
    updateFK();
    scene.updateMatrixWorld(true);

    const eePos = getEEWorldPosition();
    const eeQuat = getEEWorldQuaternion();

    const posErr = new THREE.Vector3().subVectors(targetPos, eePos);
    const oriErr = orientationError(targetQuat, eeQuat);
    const posNorm = posErr.length();

    if (posNorm < tolerance && oriErr.length() < 0.01) return posNorm;

    // Build 6×N Jacobian: J[taskDOF][joint]
    // Rows 0-2: linear (axis × lever), Rows 3-5: angular (axis, scaled)
    const J = Array.from({length: 6}, () => Array(numJoints).fill(0));
    for (let j = 0; j < numJoints; j++) {
      const axis = getJointWorldAxis(j);
      const jPos = getJointWorldPosition(j);
      const r = new THREE.Vector3().subVectors(eePos, jPos);
      const lin = new THREE.Vector3().crossVectors(axis, r);
      J[0][j] = lin.x;  J[1][j] = lin.y;  J[2][j] = lin.z;
      J[3][j] = axis.x * oriWeight;
      J[4][j] = axis.y * oriWeight;
      J[5][j] = axis.z * oriWeight;
    }

    // Error vector (6×1)
    const e = [
      posErr.x, posErr.y, posErr.z,
      oriErr.x * oriWeight, oriErr.y * oriWeight, oriErr.z * oriWeight
    ];

    // JJT (6×6)
    const n = 6;
    const JJT = Array.from({length: n}, () => Array(n).fill(0));
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        let sum = 0;
        for (let k = 0; k < numJoints; k++) sum += J[r][k] * J[c][k];
        JJT[r][c] = sum;
      }
    }

    // Damping
    const lam2 = lambda * lambda;
    for (let i = 0; i < n; i++) JJT[i][i] += lam2;

    // Invert 6×6
    const inv = invertNxN(JJT, n);
    if (!inv) continue;

    // v = inv * e
    const v = Array(n).fill(0);
    for (let i = 0; i < n; i++)
      for (let j = 0; j < n; j++)
        v[i] += inv[i][j] * e[j];

    // Δq = J^T * v
    for (let i = 0; i < numJoints; i++) {
      let dq = 0;
      for (let j = 0; j < n; j++) dq += J[j][i] * v[j];
      jointAngles[i] += dq;
    }

    clampJoints();
  }

  updateFK();
  scene.updateMatrixWorld(true);
  return getEEWorldPosition().distanceTo(targetPos);
}

// Gauss-Jordan NxN matrix inverse
function invertNxN(m, n) {
  const aug = Array.from({length: n}, (_, i) => {
    const row = Array(2 * n).fill(0);
    for (let j = 0; j < n; j++) row[j] = m[i][j];
    row[n + i] = 1;
    return row;
  });
  for (let col = 0; col < n; col++) {
    let maxRow = col, maxVal = Math.abs(aug[col][col]);
    for (let row = col + 1; row < n; row++) {
      const v = Math.abs(aug[row][col]);
      if (v > maxVal) { maxVal = v; maxRow = row; }
    }
    if (maxVal < 1e-12) return null;
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];
    const pivot = aug[col][col];
    for (let j = 0; j < 2 * n; j++) aug[col][j] /= pivot;
    for (let row = 0; row < n; row++) {
      if (row === col) continue;
      const f = aug[row][col];
      for (let j = 0; j < 2 * n; j++) aug[row][j] -= f * aug[col][j];
    }
  }
  return aug.map(row => row.slice(n));
}

// Virtual angle slider handlers (kappa geometry)
if (isKappaGeometry) {
  // Helper: given virtual theta, chi, phi → set physical ktheta, kappa, kphi
  // κ+ mode: kappa = K, ktheta = vθ + comp_θ, kphi = vφ + comp_φ
  // κ− mode: negate all three physical angles (sign-flipped solution)
  function applyVirtualAngles(vThetaDeg, chiDeg, vPhiDeg) {
    const result = eulerToKappa(chiDeg);
    if (!result) return; // chi out of range
    const comp = getCompensation(result.kappa);
    const sign = kappaSignPositive ? 1 : -1;
    jointAngles[kappaJointIdx] = sign * result.kappa * deg2rad;
    jointAngles[thetaJointIdx] = sign * (vThetaDeg + comp.theta) * deg2rad;
    jointAngles[phiJointIdx] = sign * (vPhiDeg + comp.phi) * deg2rad;
    clampJoints();
    updateFK();
    updateSliders();
    if (ikMode) {
      scene.updateMatrixWorld(true);
      ikTarget.position.copy(getEEWorldPosition());
      ikTargetQuat.copy(getEEWorldQuaternion());
      ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
      syncIKSliders();
    }
  }

  // Helper: read current virtual angles from the sliders
  function readVirtualAngles() {
    return {
      theta: parseFloat(document.getElementById('vthetaSlider').value),
      chi: parseFloat(document.getElementById('chiSlider').value),
      phi: parseFloat(document.getElementById('vphiSlider').value),
    };
  }

  // Chi slider
  document.getElementById('chiSlider').addEventListener('input', (e) => {
    const v = readVirtualAngles();
    v.chi = parseFloat(e.target.value);
    document.getElementById('vchi').textContent = v.chi.toFixed(1);
    applyVirtualAngles(v.theta, v.chi, v.phi);

  // Virtual theta slider
  document.getElementById('vthetaSlider').addEventListener('input', (e) => {

    v.theta = parseFloat(e.target.value);

}

function makeSpanEditable(spanId, onCommit) {
  const span = document.getElementById(spanId);
  if (!span) return;
  span.addEventListener('dblclick', () => {
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'val-input';
    input.value = parseFloat(span.textContent);
    span.style.display = 'none';
    span.parentNode.insertBefore(input, span.nextSibling);
    input.focus();
    input.select();
    const finish = (apply) => {
      if (apply) {
        const v = parseFloat(input.value);
        if (!isNaN(v)) onCommit(v);
      }
      input.remove();
      span.style.display = '';
    };
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); }
      if (e.key === 'Escape') finish(false);
    });
  });
}

// STL Import + IndexedDB Persistence
// ============================================================
const stlLoader = new STLLoader();
const objLoader = new OBJLoader();
const plyLoader = new PLYLoader();
const gltfImportLoader = new GLTFLoader();
const importedSTLs = []; // { mesh, label, name, color, stlId, fileType }
const stlColors = [0x44aaff, 0xff6644, 0x44ff88, 0xffaa22, 0xcc44ff, 0xff4488, 0x22ddcc, 0xaadd22];
let stlColorIdx = 0;

// --- IndexedDB helpers ---
const STL_DB_NAME = 'RobotViewerSTLs';
const STL_DB_VERSION = 1;
const STL_STORE = 'stls';

function openSTLDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(STL_DB_NAME, STL_DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STL_STORE)) {
        db.createObjectStore(STL_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveSTLToDB(entry) {
  const db = await openSTLDB();
  const tx = db.transaction(STL_STORE, 'readwrite');
  const store = tx.objectStore(STL_STORE);
  const m = entry.mesh;
  store.put({
    id: entry.stlId,
    name: entry.name,
    color: entry.color,
    buffer: entry._buffer,
    fileType: entry.fileType || 'stl',
    position: [m.position.x, m.position.y, m.position.z],
    rotation: [m.rotation.x, m.rotation.y, m.rotation.z],
    scale: [m.scale.x, m.scale.y, m.scale.z],
    visible: m.visible,
    parentLink: entry.parentLink || null,
  });
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function deleteSTLFromDB(stlId) {
  const db = await openSTLDB();
  const tx = db.transaction(STL_STORE, 'readwrite');
  tx.objectStore(STL_STORE).delete(stlId);
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadAllSTLsFromDB() {
  const db = await openSTLDB();
  const tx = db.transaction(STL_STORE, 'readonly');
  const store = tx.objectStore(STL_STORE);
  return new Promise((resolve, reject) => {
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function saveSTLDebounced(entry) {
  saveSTLToDB(entry).catch(e => console.warn('STL save failed:', e));
}

// --- Restore persisted meshes on load ---
async function restorePersistedSTLs() {
  try {
    const records = await loadAllSTLsFromDB();
    for (const rec of records) {
      const transforms = {
        position: rec.position,
        rotation: rec.rotation,
        scale: rec.scale,
        visible: rec.visible,
        parentLink: rec.parentLink || null,
      };
      const fileType = rec.fileType || 'stl';
      if (fileType === 'stl') {
        createSTLFromBuffer(rec.buffer, rec.name, rec.color, rec.id, transforms);
      } else if (fileType === 'ply') {
        const geometry = plyLoader.parse(rec.buffer);
        if (_isPLYPointCloud(rec.buffer)) {
          _addPointsToScene(geometry, rec.buffer, rec.name, rec.color, rec.id, transforms);
        } else {
          geometry.computeVertexNormals();
          _addMeshToScene(geometry, rec.buffer, 'ply', rec.name, rec.color, rec.id, transforms);
        }
      } else if (fileType === 'obj') {
        const text = new TextDecoder().decode(rec.buffer);
        const group = objLoader.parse(text);
        const geometry = _mergeObject3D(group);
        _addMeshToScene(geometry, rec.buffer, 'obj', rec.name, rec.color, rec.id, transforms);
      } else if (fileType === 'glb') {
        try {
          const gltf = await new Promise((resolve, reject) =>
            gltfImportLoader.parse(rec.buffer, '', resolve, reject));
          const geometry = _mergeObject3D(gltf.scene);
          _addMeshToScene(geometry, rec.buffer, 'glb', rec.name, rec.color, rec.id, transforms);
        } catch (e) {
          console.warn('Failed to restore GLB mesh:', rec.name, e);
        }
      }
    }
  } catch (e) {
    console.warn('Failed to restore meshes:', e);
  }
}

// --- Merge all sub-meshes of an Object3D into one BufferGeometry ---
// Manually concatenates position arrays to avoid mergeGeometries attribute
// compatibility requirements (mixed UVs, normals, indices, etc.).
function _mergeObject3D(object3D) {
  const chunks = [];
  let totalVerts = 0;

  object3D.updateWorldMatrix(true, true);
  object3D.traverse(child => {
    if (!child.isMesh || !child.geometry) return;
    let geo = child.geometry.clone();
    child.updateWorldMatrix(true, false);
    geo.applyMatrix4(child.matrixWorld);
    if (geo.index) geo = geo.toNonIndexed();
    const pos = geo.getAttribute('position');
    if (!pos || pos.count === 0) return;
    // Copy via accessor so any underlying typed array works
    const arr = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) {
      arr[i * 3]     = pos.getX(i);
      arr[i * 3 + 1] = pos.getY(i);
      arr[i * 3 + 2] = pos.getZ(i);
    }
    chunks.push(arr);
    totalVerts += pos.count;
  });

  const merged = new THREE.BufferGeometry();
  if (totalVerts > 0) {
    const positions = new Float32Array(totalVerts * 3);
    let offset = 0;
    for (const chunk of chunks) {
      positions.set(chunk, offset);
      offset += chunk.length;
    }
    merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  }
  merged.computeVertexNormals();
  return merged;
}

// --- Detect whether a PLY buffer is a point cloud (no face element) ---
function _isPLYPointCloud(buffer) {
  // PLY header is always ASCII; read first 2 KB to find it
  const header = new TextDecoder().decode(new Uint8Array(buffer, 0, Math.min(2048, buffer.byteLength)));
  return !header.includes('element face');
}

// --- Point cloud entry creator (THREE.Points, no BVH) ---
function _addPointsToScene(geometry, buffer, name, color, stlId, transforms) {
  const hasVertexColors = geometry.hasAttribute('color');
  // If the PLY has per-point colours, start with white so the swatch acts as
  // a tint multiplier rather than overriding the original colours.
  const matColor = hasVertexColors ? 0xffffff : color;
  const material = new THREE.PointsMaterial({
    color: matColor, size: 0.003, sizeAttenuation: true,
    vertexColors: hasVertexColors,
    transparent: true, opacity: 0.9,
  });
  const points = new THREE.Points(geometry, material);

  if (transforms) {
    points.position.set(...transforms.position);
    points.rotation.set(...transforms.rotation);
    points.scale.set(...transforms.scale);
    points.visible = transforms.visible;
  } else {
    const box = new THREE.Box3().setFromObject(points);
    const size = box.getSize(new THREE.Vector3());
    if (size.length() > 1) points.scale.setScalar(0.001);
  }

  scene.add(points);
  const box = new THREE.Box3().setFromObject(points);
  const div = document.createElement('div');
  div.className = 'mesh-label';
  div.textContent = name;
  const label = new CSS2DObject(div);
  label.visible = labelsOn;
  const center = box.getCenter(new THREE.Vector3());
  points.worldToLocal(center);
  label.position.copy(center);
  points.add(label);
  meshLabels.push(label);

  const entry = { mesh: points, label, name, color: matColor, stlId, _buffer: buffer, fileType: 'ply', isPointCloud: true, parentLink: null };
  importedSTLs.push(entry);
  stlColorIdx = Math.max(stlColorIdx, stlColors.indexOf(color) + 1);
  addSTLListItem(entry);
  return entry;
}

// --- Shared mesh-entry creator (used by all format loaders) ---
function _addMeshToScene(geometry, buffer, fileType, name, color, stlId, transforms) {
  geometry.boundsTree = new MeshBVH(geometry);

  const material = new THREE.MeshStandardMaterial({
    color, metalness: 0.3, roughness: 0.6,
    transparent: true, opacity: 0.85,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  if (transforms) {
    mesh.position.set(...transforms.position);
    mesh.rotation.set(...transforms.rotation);
    mesh.scale.set(...transforms.scale);
    mesh.visible = transforms.visible;
  } else {
    // Files in mm — auto-scale if bounding box > 1 m
    const box = new THREE.Box3().setFromObject(mesh);
    const size = box.getSize(new THREE.Vector3());
    if (size.length() > 1) mesh.scale.setScalar(0.001);
  }

  scene.add(mesh);
  const box = new THREE.Box3().setFromObject(mesh);
  const div = document.createElement('div');
  div.className = 'mesh-label';
  div.textContent = name;
  const label = new CSS2DObject(div);
  label.visible = labelsOn;
  const center = box.getCenter(new THREE.Vector3());
  mesh.worldToLocal(center);
  label.position.copy(center);
  mesh.add(label);
  meshLabels.push(label);

  const entry = { mesh, label, name, color, stlId, _buffer: buffer, fileType, parentLink: null };
  importedSTLs.push(entry);
  stlColorIdx = Math.max(stlColorIdx, stlColors.indexOf(color) + 1);
  addSTLListItem(entry);

  if (transforms && transforms.parentLink) {
    setSTLParent(entry, transforms.parentLink, true);
  }
  return entry;
}

// --- Core STL creation from ArrayBuffer ---
function createSTLFromBuffer(buffer, name, color, stlId, transforms) {
  const geometry = stlLoader.parse(buffer);
  geometry.computeVertexNormals();
  return _addMeshToScene(geometry, buffer, 'stl', name, color, stlId, transforms);
}

document.getElementById('stlFile').addEventListener('change', (e) => {

    if (ext === 'stl')       loadSTLFile(file);
    else if (ext === 'obj')  loadOBJFile(file);

function loadSTLFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const buffer = e.target.result;
    const baseName = file.name.replace(/\.stl$/i, '');
    const color = stlColors[stlColorIdx++ % stlColors.length];
    const stlId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const entry = createSTLFromBuffer(buffer, baseName, color, stlId, null);
    saveSTLDebounced(entry);
  };
  reader.readAsArrayBuffer(file);
}

function loadOBJFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const group = objLoader.parse(text);
    const geometry = _mergeObject3D(group);
    const buffer = new TextEncoder().encode(text).buffer;
    const baseName = file.name.replace(/\.obj$/i, '');
    const color = stlColors[stlColorIdx++ % stlColors.length];
    const stlId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const entry = _addMeshToScene(geometry, buffer, 'obj', baseName, color, stlId, null);
    saveSTLDebounced(entry);
  };
  reader.readAsText(file);
}

function loadPLYFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const buffer = e.target.result;
    const geometry = plyLoader.parse(buffer);
    const baseName = file.name.replace(/\.ply$/i, '');
    const color = stlColors[stlColorIdx++ % stlColors.length];
    const stlId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    let entry;
    if (_isPLYPointCloud(buffer)) {
      entry = _addPointsToScene(geometry, buffer, baseName, color, stlId, null);
    } else {
      geometry.computeVertexNormals();
      entry = _addMeshToScene(geometry, buffer, 'ply', baseName, color, stlId, null);
    }
    saveSTLDebounced(entry);
  };
  reader.readAsArrayBuffer(file);
}

async function loadGLBFile(file) {
  const buffer = await file.arrayBuffer();
  const baseName = file.name.replace(/\.(glb|gltf)$/i, '');
  const color = stlColors[stlColorIdx++ % stlColors.length];
  const stlId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  try {
    const gltf = await new Promise((resolve, reject) =>
      gltfImportLoader.parse(buffer, '', resolve, reject));
    const geometry = _mergeObject3D(gltf.scene);
    const entry = _addMeshToScene(geometry, buffer, 'glb', baseName, color, stlId, null);
    saveSTLDebounced(entry);
  } catch (err) {
    console.error('GLB load error:', err);
    alert(`Failed to load GLB/GLTF file: ${err.message}`);
  }
}

// --- Primitive creation (cube / sphere) ---
function geometryToSTLBuffer(geometry) {
  const pos = geometry.getAttribute('position');
  const idx = geometry.getIndex();
  const triCount = idx ? idx.count / 3 : pos.count / 3;
  const bufLen = 84 + triCount * 50;
  const buf = new ArrayBuffer(bufLen);
  const view = new DataView(buf);
  // 80-byte header (zeros) + triangle count
  view.setUint32(80, triCount, true);
  let offset = 84;
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const cb = new THREE.Vector3(), ab = new THREE.Vector3();
  for (let i = 0; i < triCount; i++) {
    const a = idx ? idx.getX(i * 3)     : i * 3;
    const b = idx ? idx.getX(i * 3 + 1) : i * 3 + 1;
    const c = idx ? idx.getX(i * 3 + 2) : i * 3 + 2;
    vA.fromBufferAttribute(pos, a);
    vB.fromBufferAttribute(pos, b);
    vC.fromBufferAttribute(pos, c);
    cb.subVectors(vC, vB); ab.subVectors(vA, vB); cb.cross(ab).normalize();
    // normal
    view.setFloat32(offset, cb.x, true); offset += 4;
    view.setFloat32(offset, cb.y, true); offset += 4;
    view.setFloat32(offset, cb.z, true); offset += 4;
    // vertices
    for (const v of [vA, vB, vC]) {
      view.setFloat32(offset, v.x, true); offset += 4;
      view.setFloat32(offset, v.y, true); offset += 4;
      view.setFloat32(offset, v.z, true); offset += 4;
    }
    // attribute byte count
    view.setUint16(offset, 0, true); offset += 2;
  }
  return buf;
}

function addPrimitive(type) {
  const size = 0.05; // 50mm in meters
  let geometry;
  let name;
  if (type === 'cube') {
    geometry = new THREE.BoxGeometry(size, size, size);
    name = 'Cube';
  } else if (type === 'sphere') {
    geometry = new THREE.SphereGeometry(size / 2, 24, 16);
    name = 'Sphere';
  } else {
    geometry = new THREE.CylinderGeometry(size / 2, size / 2, size, 24);
    name = 'Cylinder';
  }
  // Convert indexed geometry to non-indexed for STL compatibility
  const nonIndexed = geometry.index ? geometry.toNonIndexed() : geometry;
  const buffer = geometryToSTLBuffer(nonIndexed);
  geometry.dispose();
  nonIndexed.dispose();

  const color = stlColors[stlColorIdx++ % stlColors.length];
  const stlId = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const entry = createSTLFromBuffer(buffer, name, color, stlId, null);
  saveSTLDebounced(entry);
}

function addSTLListItem(entry) {
  const list = document.getElementById('stl-list');
  const item = document.createElement('div');
  item.className = 'stl-item';

  const colorSwatch = document.createElement('input');
  colorSwatch.type = 'color';
  colorSwatch.className = 'stl-color';
  colorSwatch.value = '#' + new THREE.Color(entry.color).getHexString();
  colorSwatch.title = 'Change color';
  colorSwatch.addEventListener('input', () => {
    entry.mesh.material.color.set(colorSwatch.value);
    entry.color = entry.mesh.material.color.getHex();
    saveSTLDebounced(entry);
  });

  const nameSpan = document.createElement('span');
  nameSpan.className = 'stl-name';
  nameSpan.textContent = entry.name;
  nameSpan.title = 'Click to select, double-click to rename';
  nameSpan.addEventListener('click', (e) => {
    e.stopPropagation();
    selectSTL(entry, item);
  });
  nameSpan.addEventListener('dblclick', () => {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'val-input';
    input.style.width = '100px';
    input.value = entry.name;
    nameSpan.style.display = 'none';
    nameSpan.parentNode.insertBefore(input, nameSpan.nextSibling);
    input.focus();
    input.select();
    const finish = (apply) => {
      if (apply && input.value.trim()) {
        entry.name = input.value.trim();
        nameSpan.textContent = entry.name;
        entry.label.element.textContent = entry.name;
        saveSTLDebounced(entry);
      }
      input.remove();
      nameSpan.style.display = '';
    };
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); }
      if (e.key === 'Escape') finish(false);
    });
  });

  const visBtn = document.createElement('button');
  visBtn.className = 'stl-vis';
  visBtn.textContent = '👁';
  visBtn.title = 'Toggle visibility';
  visBtn.style.opacity = entry.mesh.visible ? 1 : 0.3;
  visBtn.addEventListener('click', () => {
    entry.mesh.visible = !entry.mesh.visible;
    visBtn.style.opacity = entry.mesh.visible ? 1 : 0.3;
    saveSTLDebounced(entry);
  });

  const rmBtn = document.createElement('button');
  rmBtn.className = 'stl-rm';
  rmBtn.textContent = '✕';
  rmBtn.title = 'Remove';
  rmBtn.addEventListener('click', () => {
    if (selectedSTL === entry) deselectSTL();
    entry.mesh.removeFromParent();
    entry.mesh.geometry.dispose();
    entry.mesh.material.dispose();
    const li = meshLabels.indexOf(entry.label);
    if (li >= 0) meshLabels.splice(li, 1);
    const si = importedSTLs.indexOf(entry);
    if (si >= 0) importedSTLs.splice(si, 1);
    item.remove();
    deleteSTLFromDB(entry.stlId).catch(e => console.warn('STL delete failed:', e));
  });

  item.appendChild(colorSwatch);
  item.appendChild(nameSpan);
  item.appendChild(visBtn);
  item.appendChild(rmBtn);
  list.appendChild(item);
}

const _reparentMat = new THREE.Matrix4();

// setSTLParent(entry, linkName, preserveLocal)
//   linkName: 'L0'-'L5' or '' / null for world
//   preserveLocal: if true, keep current local transform (use when restoring from DB)
//                  if false, recompute local transform from current world matrix
function setSTLParent(entry, linkName, preserveLocal = false) {
  const mesh = entry.mesh;

  if (!preserveLocal) {
    mesh.updateWorldMatrix(true, false);
    _reparentMat.copy(mesh.matrixWorld);
  }

  // Detach from current parent
  mesh.removeFromParent();

  const jointIdx = linkName ? linkToJoint[linkName] : undefined;
  if (linkName && jointIdx !== undefined) {
    const linkGroup = jointRotGroups[jointIdx];
    if (!preserveLocal) {
      linkGroup.updateWorldMatrix(true, false);
      const localMat = linkGroup.matrixWorld.clone().invert().multiply(_reparentMat);
      localMat.decompose(mesh.position, mesh.quaternion, mesh.scale);
      mesh.rotation.setFromQuaternion(mesh.quaternion);
    }
    linkGroup.add(mesh);
    entry.parentLink = linkName;
  } else {
    if (!preserveLocal) {
      _reparentMat.decompose(mesh.position, mesh.quaternion, mesh.scale);
      mesh.rotation.setFromQuaternion(mesh.quaternion);
    }
    scene.add(mesh);
    entry.parentLink = null;
  }

  saveSTLDebounced(entry);
}

function selectSTL(entry, listItem) {

renderer.domElement.addEventListener('pointerdown', (e) => {
  // Ignore if dragging a gizmo
  if (stlTransformControls.dragging || transformControls.dragging) return;
  // Only left-click
  if (e.button !== 0) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, activeCamera);

  // Test against all imported STL meshes
  const stlMeshes = importedSTLs.filter(s => s.mesh.visible).map(s => s.mesh);
  const hits = raycaster.intersectObjects(stlMeshes, false);

  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const entry = importedSTLs.find(s => s.mesh === hitMesh);
    if (entry) {
      // Find the corresponding list item
      const listItems = document.querySelectorAll('.stl-item');
      const idx = importedSTLs.indexOf(entry);
      selectSTL(entry, listItems[idx] || null);
    }
  }
});

// Click on empty space to deselect (only if not dragging)
renderer.domElement.addEventListener('click', (e) => {
  if (stlTransformControls.dragging || transformControls.dragging) return;
  if (!selectedSTL) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, activeCamera);

  // Check if we hit any STL or the gizmo
  const stlMeshes = importedSTLs.filter(s => s.mesh.visible).map(s => s.mesh);
  const hits = raycaster.intersectObjects(stlMeshes, false);
  if (hits.length === 0) {

    const gizmoHits = raycaster.intersectObjects(stlTransformControls.children, true);
    if (gizmoHits.length === 0) deselectSTL();

});

// Collision Detection
// ============================================================
let collisionEnabled = false;
let lastCollisions = []; // persisted for API access: [{ linkName, stlName }]

// Build kinematic adjacency set for self-collision skipping
// Two links are adjacent if their joints share a direct parent-child path (through fixed joints)
const _adjPairs = new Set();
{
  // For each joint, find the nearest movable ancestor joint index
  function movableAncestor(jointIdx) {
    let idx = config.joints[jointIdx].parent;
    while (idx >= 0) {
      if (!config.joints[idx].fixed) return idx;
      idx = config.joints[idx].parent;
    }
    return -1;
  }
  // Group links by joint index
  const linksByJoint = {};
  for (const link of config.links) {
    if (!linksByJoint[link.joint]) linksByJoint[link.joint] = [];
    linksByJoint[link.joint].push(link.name);
  }
  // Links on the same joint are adjacent
  for (const names of Object.values(linksByJoint)) {
    for (let a = 0; a < names.length; a++)
      for (let b = a + 1; b < names.length; b++)
        _adjPairs.add([names[a], names[b]].sort().join('|'));
  }
  // Links whose movable joints are parent-child are adjacent
  for (const linkA of config.links) {
    const ancA = movableAncestor(linkA.joint);
    for (const linkB of config.links) {
      if (linkA.name >= linkB.name) continue;
      // Check if linkB's joint is the movable ancestor of linkA or vice versa
      const ancB = movableAncestor(linkB.joint);
      const jA = config.joints[linkA.joint].fixed ? movableAncestor(linkA.joint) : linkA.joint;
      const jB = config.joints[linkB.joint].fixed ? movableAncestor(linkB.joint) : linkB.joint;
      if (jA === jB || jA === ancB || jB === ancA) {
        _adjPairs.add([linkA.name, linkB.name].sort().join('|'));
      }
    }
  }
}
function areLinksAdjacent(nameA, nameB) {
  return _adjPairs.has([nameA, nameB].sort().join('|'));
}
const collisionInfoEl = document.getElementById('collision-info');
const collisionTextEl = document.getElementById('collision-text');

// Persistent map: saves each material's original emissive exactly once
const materialOriginalEmissive = new WeakMap();
// Set of materials currently highlighted red (cleared each frame)
const highlightedMaterials = new Set();

// Separate tracking for PointsMaterial (no emissive — use colour instead)
const materialOriginalColor = new WeakMap();
const highlightedPointMaterials = new Set();

function saveOriginalEmissive(material) {
  if (!materialOriginalEmissive.has(material)) {
    materialOriginalEmissive.set(material, material.emissive.clone());
  }
}

collisionBtn.addEventListener('click', () => {

  collisionBtn.textContent = `Collision: ${collisionEnabled ? 'ON' : 'OFF'}`;
  collisionBtn.classList.toggle('active', collisionEnabled);
  collisionInfoEl.style.display = collisionEnabled ? 'block' : 'none';
  if (!collisionEnabled) clearCollisionHighlights();
});

function clearCollisionHighlights() {
  if (highlightedMaterials.size === 0 && highlightedPointMaterials.size === 0) return;
  for (const material of highlightedMaterials) {
    const original = materialOriginalEmissive.get(material);
    if (original) material.emissive.copy(original);
  }
  highlightedMaterials.clear();
  for (const material of highlightedPointMaterials) {
    const original = materialOriginalColor.get(material);
    if (original) material.color.copy(original);
  }
  highlightedPointMaterials.clear();
  collisionInfoEl.classList.remove('hit');
  collisionTextEl.textContent = 'none';
  // Remove child spans
  while (collisionTextEl.nextSibling) collisionTextEl.nextSibling.remove();
}

// Transforms the 8 corners of the local AABB to world space
const _corners = new Array(8).fill(null).map(() => new THREE.Vector3());
function fastWorldAABB(mesh, target) {
