<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meca500 Robot - Three.js FK/IK Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', monospace; }
  canvas { display: block; }
  #panel {
    position: absolute; top: 10px; right: 10px; width: 260px;
    background: rgba(10,10,30,0.85); color: #ccc; padding: 14px;
    border-radius: 8px; backdrop-filter: blur(8px);
    border: 1px solid rgba(100,100,200,0.2);
  }
  #panel h2 { font-size: 14px; margin-bottom: 10px; color: #aac; }
  .slider-row { margin-bottom: 8px; }
  .slider-row label {
    display: flex; justify-content: space-between; font-size: 12px;
    margin-bottom: 2px; color: #99a;
  }
  .slider-row label span { color: #8cf; font-weight: bold; }
  input[type="range"] {
    width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
    background: #2a2a4a; border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #6688ff; border-radius: 50%; cursor: pointer;
  }
  #info {
    position: absolute; bottom: 10px; left: 10px; color: #667;
    font-size: 11px; font-family: monospace;
  }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #aac; font-size: 16px; font-family: monospace;
  }
  button {
    width: 100%; padding: 6px; margin-top: 6px; background: #334;
    color: #aac; border: 1px solid #446; border-radius: 4px; cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #445; }
  button.active { background: #448; border-color: #66f; color: #fff; }
  #ee-info {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #334;
    font-size: 11px; color: #889;
  }
  #ee-info span { color: #8cf; }
  .slider-row label span { cursor: text; }
  .val-input {
    width: 54px; background: rgba(0,0,40,0.6); border: 1px solid #66f;
    color: #8cf; font-weight: bold; font-size: 12px; font-family: monospace;
    text-align: right; outline: none; padding: 0 3px; border-radius: 2px;
  }
  .mesh-label {
    color: #fff; font-size: 11px; font-family: monospace;
    background: rgba(0,0,0,0.6); padding: 1px 5px; border-radius: 3px;
    white-space: nowrap; pointer-events: none;
  }
</style>
</head>
<body>
<div id="loading">Loading robot model...</div>
<div id="panel">
  <h2>Joint Angles (deg)</h2>
  <div class="slider-row">
    <label>J1 Base <span id="v1">0</span></label>
    <input type="range" id="j1" min="-175" max="175" value="0" step="0.5">
  </div>
  <div class="slider-row">
    <label>J2 Shoulder <span id="v2">0</span></label>
    <input type="range" id="j2" min="-70" max="90" value="0" step="0.5">
  </div>
  <div class="slider-row">
    <label>J3 Elbow <span id="v3">0</span></label>
    <input type="range" id="j3" min="-135" max="70" value="0" step="0.5">
  </div>
  <div class="slider-row">
    <label>J4 Wrist Roll <span id="v4">0</span></label>
    <input type="range" id="j4" min="-170" max="170" value="0" step="0.5">
  </div>
  <div class="slider-row">
    <label>J5 Wrist Pitch <span id="v5">0</span></label>
    <input type="range" id="j5" min="-115" max="115" value="0" step="0.5">
  </div>
  <div class="slider-row">
    <label>J6 Flange <span id="v6">0</span></label>
    <input type="range" id="j6" min="-360" max="360" value="0" step="0.5">
  </div>
  <button id="resetBtn">Reset to Home</button>
  <button id="demoBtn">Demo Pose</button>
  <button id="ikBtn">IK Mode: OFF</button>
  <button id="labelBtn">Labels: OFF</button>
  <div id="ik-panel" style="display:none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #334;">
    <h2 style="color:#5b5;">IK Target (mm)</h2>
    <div class="slider-row">
      <label>X <span id="ikvx">190</span></label>
      <input type="range" id="ikx" min="-400" max="400" value="190" step="1">
    </div>
    <div class="slider-row">
      <label>Y <span id="ikvy">0</span></label>
      <input type="range" id="iky" min="-400" max="400" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>Z <span id="ikvz">308</span></label>
      <input type="range" id="ikz" min="-100" max="500" value="308" step="1">
    </div>
    <h2 style="color:#5b5; margin-top:8px;">IK Orientation (deg)</h2>
    <div class="slider-row">
      <label>&alpha; (Rz) <span id="ikva">0</span></label>
      <input type="range" id="ika" min="-180" max="180" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>&beta; (Ry) <span id="ikvb">0</span></label>
      <input type="range" id="ikb" min="-180" max="180" value="0" step="1">
    </div>
    <div class="slider-row">
      <label>&gamma; (Rx) <span id="ikvc">0</span></label>
      <input type="range" id="ikc" min="-180" max="180" value="0" step="1">
    </div>
  </div>
  <div id="ee-info">
    EE: <span id="eePos">-</span><br>
    Target: <span id="tgtPos">-</span><br>
    Error: <span id="ikErr">-</span>
  </div>
</div>
<div id="info">Scroll to zoom | Drag to orbit | Right-drag to pan | IK: drag the green sphere</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================
// Scene
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3a);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.001, 50);
camera.position.set(0.45, 0.30, 0.40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.target.set(0, 0.15, 0);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.update();

// ============================================================
// Lighting
// ============================================================
const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(-0.53, 0.72, 0.41);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.01;
sun.shadow.camera.far = 3;
sun.shadow.camera.left = sun.shadow.camera.bottom = -0.5;
sun.shadow.camera.right = sun.shadow.camera.top = 0.5;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-0.886, 1.022, 0.668);
scene.add(fill);

const spot = new THREE.SpotLight(0x0058ff, 40, 3, Math.PI / 4, 0.5);
spot.position.set(-0.068, 0.586, 0.830);
scene.add(spot);

scene.add(new THREE.AmbientLight(0x404060, 0.7));
scene.add(new THREE.HemisphereLight(0x8888bb, 0x333344, 0.4));

// ============================================================
// FK chain built from Blender armature bone transforms
// (converted to Three.js Y-up coords)
// ============================================================

const jointData = [
  { // J1 (Bone) - base rotation
    restPos: [0, 0.09498, 0],
    restQuat: [0.70711, 0.70711, 0, 0],  // w,x,y,z
    axis: [0, 0, 1],  // local Z
  },
  { // J2 (Bone.001) - shoulder pitch
    restPos: [0, 0, -0.04002],
    restQuat: [0.99999, 0, 0.00401, 0.00015],
    axis: [0, -1, 0],  // local -Y
  },
  { // J3 (Bone.002) - elbow pitch
    restPos: [0, 0, -0.135],
    restQuat: [0.87216, 0.00338, -0.48916, -0.00629],
    axis: [0, -1, 0],  // local -Y
  },
  { // J4 (Bone.003) - forearm roll
    restPos: [0, 0, -0.07194],
    restQuat: [0.96152, 0.00229, -0.27466, 0.00558],
    axis: [0, 0, 1],  // local Z
  },
  { // J5 (Bone.004) - wrist pitch
    restPos: [0, 0, -0.06],
    restQuat: [1, 0, -0.00001, 0.00278],
    axis: [0, -1, 0],  // local -Y
  },
  { // J6 (Bone.006) - flange roll around forearm/approach axis
    restPos: [0, 0, -0.07],
    restQuat: [0.70711, 0.00215, 0.7071, 0],
    axis: [1, 0, 0],  // local X
  },
];

// Joint limits in radians [min, max]
const jointLimits = [
  [-175 * Math.PI/180, 175 * Math.PI/180],   // J1
  [-70 * Math.PI/180,  90 * Math.PI/180],    // J2
  [-135 * Math.PI/180, 70 * Math.PI/180],    // J3
  [-170 * Math.PI/180, 170 * Math.PI/180],   // J4
  [-115 * Math.PI/180, 115 * Math.PI/180],   // J5
  [-360 * Math.PI/180, 360 * Math.PI/180],   // J6
];

// Link name -> joint index
const linkToJoint = { 'L0': 0, 'L1': 1, 'L2': 2, 'L3': 3, 'L4': 4, 'L5': 5 };

// Build the FK chain
const jointRestGroups = [];
const jointRotGroups = [];
const jointAxes = [];

let parent = scene;
for (let i = 0; i < 6; i++) {
  const d = jointData[i];

  const restGrp = new THREE.Group();
  restGrp.name = `J${i+1}_rest`;
  restGrp.position.set(d.restPos[0], d.restPos[1], d.restPos[2]);
  restGrp.quaternion.set(d.restQuat[1], d.restQuat[2], d.restQuat[3], d.restQuat[0]);
  parent.add(restGrp);
  jointRestGroups.push(restGrp);

  const rotGrp = new THREE.Group();
  rotGrp.name = `J${i+1}_rot`;
  restGrp.add(rotGrp);
  jointRotGroups.push(rotGrp);

  jointAxes.push(new THREE.Vector3(d.axis[0], d.axis[1], d.axis[2]).normalize());

  parent = rotGrp;
}

// End-effector frame marker (custom colors to match robot convention)
// Local +X = Robot +X (Blue), Local +Y = Robot +Y (Green), Local +Z = Down (Red)
const eeMarker = new THREE.Group();
parent.add(eeMarker);
const axLen = 0.03;
function makeAxis(dir, color) {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), dir.clone().multiplyScalar(axLen)]);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color }));
}
eeMarker.add(makeAxis(new THREE.Vector3(1, 0, 0), 0x0000ff));  // Blue  → Robot +X
eeMarker.add(makeAxis(new THREE.Vector3(0, -1, 0), 0x00ff00)); // Green → Robot +Y
eeMarker.add(makeAxis(new THREE.Vector3(0, 0, 1), 0xff0000));  // Red   → Down

// ============================================================
// IK target
// ============================================================
const targetGeo = new THREE.SphereGeometry(0.012, 16, 16);
const targetMat = new THREE.MeshStandardMaterial({
  color: 0x22ff44, emissive: 0x115522, transparent: true, opacity: 0.8
});
const ikTarget = new THREE.Mesh(targetGeo, targetMat);
ikTarget.position.set(0.19, 0.308, 0); // start at EE rest position
ikTarget.visible = false;
scene.add(ikTarget);

// Target orientation (quaternion, set from Euler sliders)
const ikTargetQuat = new THREE.Quaternion();
const ikTargetEuler = new THREE.Euler(0, 0, 0, 'YZX');

// Dashed line from EE to target
const lineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(), new THREE.Vector3()
]);
const lineMat = new THREE.LineBasicMaterial({ color: 0x22ff44, transparent: true, opacity: 0.5 });
const ikLine = new THREE.Line(lineGeo, lineMat);
ikLine.visible = false;
scene.add(ikLine);

// Transform controls for dragging the target
const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.setSize(0.5);
transformControls.setMode('translate');
transformControls.addEventListener('dragging-changed', (e) => {
  orbitControls.enabled = !e.value;
});
scene.add(transformControls);

// ============================================================
// Load glTF and attach meshes
// ============================================================
const meshLabels = [];

const loader = new GLTFLoader();
loader.load('robot_scene.glb', (gltf) => {
  document.getElementById('loading').style.display = 'none';
  const model = gltf.scene;

  const allNodes = {};
  model.traverse((child) => {
    if (child.name) allNodes[child.name] = child;
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  console.log('glTF nodes:', Object.keys(allNodes));

  const reparented = new Set();
  for (const [linkName, jointIdx] of Object.entries(linkToJoint)) {
    const node = allNodes[linkName];
    if (!node) {
      console.warn(`${linkName} not found in glTF`);
      continue;
    }

    node.updateWorldMatrix(true, false);
    const worldMat = node.matrixWorld.clone();
    node.removeFromParent();

    const target = jointRotGroups[jointIdx];
    target.updateWorldMatrix(true, false);
    const localMat = target.matrixWorld.clone().invert().multiply(worldMat);

    node.matrix.copy(localMat);
    node.matrix.decompose(node.position, node.quaternion, node.scale);
    target.add(node);

    reparented.add(linkName);
    node.traverse((c) => { if (c.name) reparented.add(c.name); });
  }

  // Remove hidden objects that were reparented as children of links
  const hideNames = ['Icosphere', 'Cross'];
  scene.traverse((child) => {
    if (child.name && hideNames.includes(child.name)) {
      child.removeFromParent();
    }
  });
  const hiddenNodes = new Set();
  model.traverse((child) => {
    if (child.name && hideNames.includes(child.name)) {
      child.traverse((c) => hiddenNodes.add(c));
    }
  });
  const statics = [];
  model.traverse((child) => {
    if (child.isMesh && !reparented.has(child.name) && !hiddenNodes.has(child)) {
      statics.push(child);
    }
  });
  for (const mesh of statics) {
    mesh.updateWorldMatrix(true, false);
    const wm = mesh.matrixWorld.clone();
    mesh.removeFromParent();
    scene.add(mesh);
    mesh.matrix.copy(wm);
    mesh.matrix.decompose(mesh.position, mesh.quaternion, mesh.scale);
  }

  // Create labels for all named mesh nodes (links + statics)
  function createLabel(name, parentObj) {
    const div = document.createElement('div');
    div.className = 'mesh-label';
    div.textContent = name;
    const label = new CSS2DObject(div);
    label.visible = false;
    // Position label at the bounding box center
    const box = new THREE.Box3().setFromObject(parentObj);
    const center = box.getCenter(new THREE.Vector3());
    parentObj.worldToLocal(center);
    label.position.copy(center);
    parentObj.add(label);
    meshLabels.push(label);
  }

  for (const [linkName] of Object.entries(linkToJoint)) {
    const node = allNodes[linkName];
    if (node) createLabel(linkName, node);
  }
  for (const mesh of statics) {
    if (mesh.name) createLabel(mesh.name, mesh);
  }

}, (progress) => {
  const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '?';
  document.getElementById('loading').textContent = `Loading... ${pct}%`;
}, (err) => {
  console.error('Load error:', err);
  document.getElementById('loading').textContent =
    'Failed to load. Run: python3 -m http.server 8000';
});

// ============================================================
// Ground + grid
// ============================================================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(4, 4),
  new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.063;
ground.receiveShadow = true;
scene.add(ground);

scene.add(new THREE.GridHelper(2, 40, 0x333355, 0x222244).translateY(-0.062));

// ============================================================
// FK functions
// ============================================================
const deg2rad = Math.PI / 180;
const rad2deg = 180 / Math.PI;
const jointAngles = [0, 0, 0, 0, 0, 0];

function updateFK() {
  for (let i = 0; i < 6; i++) {
    jointRotGroups[i].quaternion.setFromAxisAngle(jointAxes[i], jointAngles[i]);
  }
}

function updateSliders() {
  for (let i = 0; i < 6; i++) {
    const deg = jointAngles[i] * rad2deg;
    document.getElementById(`j${i+1}`).value = deg;
    document.getElementById(`v${i+1}`).textContent = deg.toFixed(1);
  }
}

function getEEWorldPosition() {
  eeMarker.updateWorldMatrix(true, false);
  return new THREE.Vector3().setFromMatrixPosition(eeMarker.matrixWorld);
}

function clampJoints() {
  for (let i = 0; i < 6; i++) {
    jointAngles[i] = Math.max(jointLimits[i][0], Math.min(jointLimits[i][1], jointAngles[i]));
  }
}

// ============================================================
// IK solver — 6-DOF DLS (position + orientation)
// ============================================================
function getJointWorldAxis(i) {
  const worldQuat = new THREE.Quaternion();
  jointRestGroups[i].getWorldQuaternion(worldQuat);
  return jointAxes[i].clone().applyQuaternion(worldQuat).normalize();
}

function getJointWorldPosition(i) {
  jointRestGroups[i].updateWorldMatrix(true, false);
  return new THREE.Vector3().setFromMatrixPosition(jointRestGroups[i].matrixWorld);
}

function getEEWorldQuaternion() {
  eeMarker.updateWorldMatrix(true, false);
  return new THREE.Quaternion().setFromRotationMatrix(eeMarker.matrixWorld);
}

function orientationError(qTarget, qCurrent) {
  const qErr = qTarget.clone().multiply(qCurrent.clone().conjugate());
  if (qErr.w < 0) { qErr.x = -qErr.x; qErr.y = -qErr.y; qErr.z = -qErr.z; qErr.w = -qErr.w; }
  const sinHalf = Math.sqrt(qErr.x*qErr.x + qErr.y*qErr.y + qErr.z*qErr.z);
  if (sinHalf < 1e-8) return new THREE.Vector3(0, 0, 0);
  const angle = 2 * Math.atan2(sinHalf, qErr.w);
  return new THREE.Vector3(qErr.x/sinHalf * angle, qErr.y/sinHalf * angle, qErr.z/sinHalf * angle);
}

function solveIK(targetPos, targetQuat, maxIter = 20, tolerance = 0.0005) {
  const lambda = 0.5;
  const oriWeight = 0.3;  // scale orientation vs position importance

  for (let iter = 0; iter < maxIter; iter++) {
    updateFK();
    scene.updateMatrixWorld(true);

    const eePos = getEEWorldPosition();
    const eeQuat = getEEWorldQuaternion();

    const posErr = new THREE.Vector3().subVectors(targetPos, eePos);
    const oriErr = orientationError(targetQuat, eeQuat);
    const posNorm = posErr.length();

    if (posNorm < tolerance && oriErr.length() < 0.01) return posNorm;

    // Build 6×6 Jacobian: J[taskDOF][joint]
    // Rows 0-2: linear (axis × lever), Rows 3-5: angular (axis, scaled)
    const J = Array.from({length: 6}, () => Array(6).fill(0));
    for (let j = 0; j < 6; j++) {
      const axis = getJointWorldAxis(j);
      const jPos = getJointWorldPosition(j);
      const r = new THREE.Vector3().subVectors(eePos, jPos);
      const lin = new THREE.Vector3().crossVectors(axis, r);
      J[0][j] = lin.x;  J[1][j] = lin.y;  J[2][j] = lin.z;
      J[3][j] = axis.x * oriWeight;
      J[4][j] = axis.y * oriWeight;
      J[5][j] = axis.z * oriWeight;
    }

    // Error vector (6×1)
    const e = [
      posErr.x, posErr.y, posErr.z,
      oriErr.x * oriWeight, oriErr.y * oriWeight, oriErr.z * oriWeight
    ];

    // JJT (6×6)
    const n = 6;
    const JJT = Array.from({length: n}, () => Array(n).fill(0));
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        let sum = 0;
        for (let k = 0; k < 6; k++) sum += J[r][k] * J[c][k];
        JJT[r][c] = sum;
      }
    }

    // Damping
    const lam2 = lambda * lambda;
    for (let i = 0; i < n; i++) JJT[i][i] += lam2;

    // Invert 6×6
    const inv = invertNxN(JJT, n);
    if (!inv) continue;

    // v = inv * e
    const v = Array(n).fill(0);
    for (let i = 0; i < n; i++)
      for (let j = 0; j < n; j++)
        v[i] += inv[i][j] * e[j];

    // Δq = J^T * v
    for (let i = 0; i < 6; i++) {
      let dq = 0;
      for (let j = 0; j < n; j++) dq += J[j][i] * v[j];
      jointAngles[i] += dq;
    }

    clampJoints();
  }

  updateFK();
  scene.updateMatrixWorld(true);
  return getEEWorldPosition().distanceTo(targetPos);
}

// Gauss-Jordan NxN matrix inverse
function invertNxN(m, n) {
  const aug = Array.from({length: n}, (_, i) => {
    const row = Array(2 * n).fill(0);
    for (let j = 0; j < n; j++) row[j] = m[i][j];
    row[n + i] = 1;
    return row;
  });
  for (let col = 0; col < n; col++) {
    let maxRow = col, maxVal = Math.abs(aug[col][col]);
    for (let row = col + 1; row < n; row++) {
      const v = Math.abs(aug[row][col]);
      if (v > maxVal) { maxVal = v; maxRow = row; }
    }
    if (maxVal < 1e-12) return null;
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];
    const pivot = aug[col][col];
    for (let j = 0; j < 2 * n; j++) aug[col][j] /= pivot;
    for (let row = 0; row < n; row++) {
      if (row === col) continue;
      const f = aug[row][col];
      for (let j = 0; j < 2 * n; j++) aug[row][j] -= f * aug[col][j];
    }
  }
  return aug.map(row => row.slice(n));
}

// ============================================================
// IK mode state
// ============================================================
let ikMode = false;

function setIKMode(on) {
  ikMode = on;
  const btn = document.getElementById('ikBtn');
  btn.textContent = `IK Mode: ${on ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', on);

  ikTarget.visible = on;
  ikLine.visible = on;

  // Show/hide IK sliders panel
  document.getElementById('ik-panel').style.display = on ? 'block' : 'none';

  if (on) {
    // Move target to current EE position and orientation
    scene.updateMatrixWorld(true);
    ikTarget.position.copy(getEEWorldPosition());
    ikTargetQuat.copy(getEEWorldQuaternion());
    ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
    transformControls.attach(ikTarget);
    syncIKSliders();
  } else {
    transformControls.detach();
  }
}

function syncIKSliders() {
  // Z-up convention: slider Y = Three.js Z, slider Z = Three.js Y
  const p = ikTarget.position;
  const xmm = Math.round(p.x * 1000);
  const ymm = Math.round(p.z * 1000);
  const zmm = Math.round(p.y * 1000);
  document.getElementById('ikx').value = xmm;
  document.getElementById('ikvx').textContent = xmm;
  document.getElementById('iky').value = ymm;
  document.getElementById('ikvy').textContent = ymm;
  document.getElementById('ikz').value = zmm;
  document.getElementById('ikvz').textContent = zmm;

  // Sync orientation sliders (ZYX Z-up: α=Rz_user=Ry_three, β=Ry_user=Rz_three, γ=Rx)
  const ad = Math.round(ikTargetEuler.y * rad2deg);
  const bd = Math.round(ikTargetEuler.z * rad2deg);
  const cd = Math.round(ikTargetEuler.x * rad2deg);
  document.getElementById('ika').value = ad;
  document.getElementById('ikva').textContent = ad;
  document.getElementById('ikb').value = bd;
  document.getElementById('ikvb').textContent = bd;
  document.getElementById('ikc').value = cd;
  document.getElementById('ikvc').textContent = cd;
}

// ============================================================
// Joint slider controls
// ============================================================
for (let i = 1; i <= 6; i++) {
  const slider = document.getElementById(`j${i}`);
  const label = document.getElementById(`v${i}`);
  slider.addEventListener('input', () => {
    const deg = parseFloat(slider.value);
    label.textContent = deg.toFixed(1);
    jointAngles[i-1] = deg * deg2rad;
    updateFK();
    // If in IK mode, move target to new EE pose
    if (ikMode) {
      scene.updateMatrixWorld(true);
      ikTarget.position.copy(getEEWorldPosition());
      ikTargetQuat.copy(getEEWorldQuaternion());
      ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
      syncIKSliders();
    }
  });
}

document.getElementById('resetBtn').addEventListener('click', () => {
  for (let i = 0; i < 6; i++) jointAngles[i] = 0;
  updateFK();
  updateSliders();
  if (ikMode) {
    scene.updateMatrixWorld(true);
    ikTarget.position.copy(getEEWorldPosition());
    ikTargetQuat.copy(getEEWorldQuaternion());
    ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
    syncIKSliders();
  }
});

document.getElementById('demoBtn').addEventListener('click', () => {
  const demo = [0, -30, 60, 0, 45, 90];
  for (let i = 0; i < 6; i++) jointAngles[i] = demo[i] * deg2rad;
  updateFK();
  updateSliders();
  if (ikMode) {
    scene.updateMatrixWorld(true);
    ikTarget.position.copy(getEEWorldPosition());
    ikTargetQuat.copy(getEEWorldQuaternion());
    ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
    syncIKSliders();
  }
});

document.getElementById('ikBtn').addEventListener('click', () => {
  setIKMode(!ikMode);
});

let labelsOn = false;
document.getElementById('labelBtn').addEventListener('click', () => {
  labelsOn = !labelsOn;
  document.getElementById('labelBtn').textContent = `Labels: ${labelsOn ? 'ON' : 'OFF'}`;
  document.getElementById('labelBtn').classList.toggle('active', labelsOn);
  meshLabels.forEach(l => l.visible = labelsOn);
});

// IK target position sliders (mm → meters, Z-up convention: Y↔Z swap)
['ikx', 'iky', 'ikz'].forEach((id) => {
  document.getElementById(id).addEventListener('input', (e) => {
    const mm = parseFloat(e.target.value);
    document.getElementById(id.replace('ik', 'ikv')).textContent = Math.round(mm);
    const sliderAxis = id.charAt(2); // 'x', 'y', or 'z'
    const threeAxis = sliderAxis === 'y' ? 'z' : sliderAxis === 'z' ? 'y' : 'x';
    ikTarget.position[threeAxis] = mm / 1000;
  });
});

// IK target orientation sliders (ZYX Z-up: α=Rz_user→euler.y, β=Ry_user→euler.z, γ=Rx→euler.x)
['ika', 'ikb', 'ikc'].forEach((id) => {
  document.getElementById(id).addEventListener('input', (e) => {
    const deg = parseFloat(e.target.value);
    document.getElementById(id.replace('ik', 'ikv')).textContent = Math.round(deg);
    const comp = id.charAt(2); // 'a'→y(three), 'b'→z(three), 'c'→x
    const axis = comp === 'a' ? 'y' : comp === 'b' ? 'z' : 'x';
    ikTargetEuler[axis] = deg * deg2rad;
    ikTargetQuat.setFromEuler(ikTargetEuler);
  });
});

// ============================================================
// Double-click on value labels to type a value
// ============================================================
function makeSpanEditable(spanId, onCommit) {
  const span = document.getElementById(spanId);
  if (!span) return;
  span.addEventListener('dblclick', () => {
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'val-input';
    input.value = parseFloat(span.textContent);
    span.style.display = 'none';
    span.parentNode.insertBefore(input, span.nextSibling);
    input.focus();
    input.select();
    const finish = (apply) => {
      if (apply) {
        const v = parseFloat(input.value);
        if (!isNaN(v)) onCommit(v);
      }
      input.remove();
      span.style.display = '';
    };
    input.addEventListener('blur', () => finish(true));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); }
      if (e.key === 'Escape') finish(false);
    });
  });
}

for (let i = 1; i <= 6; i++) {
  makeSpanEditable(`v${i}`, (val) => {
    const s = document.getElementById(`j${i}`);
    s.value = Math.max(s.min, Math.min(s.max, val));
    s.dispatchEvent(new Event('input'));
  });
}
['ikx','iky','ikz','ika','ikb','ikc'].forEach(id => {
  makeSpanEditable(id.replace('ik', 'ikv'), (val) => {
    const s = document.getElementById(id);
    s.value = Math.max(s.min, Math.min(s.max, val));
    s.dispatchEvent(new Event('input'));
  });
});

// ============================================================
// Render loop
// ============================================================
const eePosEl = document.getElementById('eePos');
const tgtPosEl = document.getElementById('tgtPos');
const ikErrEl = document.getElementById('ikErr');

function fmtV(v) {
  // Z-up: display X=three.x, Y=three.z, Z=three.y
  return `(${(v.x*1000).toFixed(1)}, ${(v.z*1000).toFixed(1)}, ${(v.y*1000).toFixed(1)})mm`;
}

function animate() {
  requestAnimationFrame(animate);

  if (ikMode) {
    // Run IK solver toward the target
    const err = solveIK(ikTarget.position, ikTargetQuat, 10, 0.0003);
    updateSliders();

    // Update line from EE to target
    const eePos = getEEWorldPosition();
    const pts = ikLine.geometry.attributes.position;
    pts.setXYZ(0, eePos.x, eePos.y, eePos.z);
    pts.setXYZ(1, ikTarget.position.x, ikTarget.position.y, ikTarget.position.z);
    pts.needsUpdate = true;

    eePosEl.textContent = fmtV(eePos);
    tgtPosEl.textContent = fmtV(ikTarget.position);
    ikErrEl.textContent = (err * 1000).toFixed(2) + 'mm';

    // Keep IK sliders in sync when target is dragged via gizmo
    syncIKSliders();
  } else {
    const eePos = getEEWorldPosition();
    eePosEl.textContent = fmtV(eePos);
    tgtPosEl.textContent = '-';
    ikErrEl.textContent = '-';
  }

  orbitControls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
