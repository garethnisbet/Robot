          x ? bb.max.x : bb.min.x,
          y ? bb.max.y : bb.min.y,
          z ? bb.max.z : bb.min.z
        ).applyMatrix4(m);
  target.makeEmpty();
  for (let j = 0; j < 8; j++) target.expandByPoint(_corners[j]);
  return target;
}

function testPointCloudCollision(pointsObj, meshObj) {
  // Broad phase
  fastWorldAABB(pointsObj, _collBox1);
  fastWorldAABB(meshObj, _collBox2);
  if (!_collBox1.intersectsBox(_collBox2)) return false;

  const bvh = meshObj.geometry.boundsTree;
  if (!bvh) return false;

  // --- Build sample array once (local space Float32Array, avoids per-frame
  //     BufferAttribute accessor overhead) ---
  if (!pointsObj._collSamples) {
    const pos = pointsObj.geometry.getAttribute('position');
    if (!pos || pos.count === 0) return false;
    const stride = Math.max(1, Math.floor(pos.count / 20000));
    const arr = new Float32Array(Math.ceil(pos.count / stride) * 3);
    let j = 0;
    for (let i = 0; i < pos.count; i += stride) {
      arr[j++] = pos.getX(i);
      arr[j++] = pos.getY(i);
      arr[j++] = pos.getZ(i);
    }
    pointsObj._collSamples = arr;
    pointsObj._collSampleCount = j / 3 | 0;
  }

  // --- Cache world-space positions (rebuilt only if point cloud moves) ---
  const matKey = pointsObj.matrixWorld.elements.join(',');
  if (!pointsObj._collWorld || pointsObj._collWorldKey !== matKey) {
    const src = pointsObj._collSamples;
    const n   = pointsObj._collSampleCount;
    const dst = pointsObj._collWorld = new Float32Array(n * 3);
    const m   = pointsObj.matrixWorld.elements;
    for (let i = 0; i < n; i++) {
      const x = src[i*3], y = src[i*3+1], z = src[i*3+2];
      dst[i*3]   = m[0]*x + m[4]*y + m[8]*z  + m[12];
      dst[i*3+1] = m[1]*x + m[5]*y + m[9]*z  + m[13];
      dst[i*3+2] = m[2]*x + m[6]*y + m[10]*z + m[14];
    }
    pointsObj._collWorldKey = matKey;
  }

  // --- Narrow phase: transform world → mesh local (inlined) and query BVH ---
  _collToLocal.copy(meshObj.matrixWorld).invert();
  const m   = _collToLocal.elements;
  const src = pointsObj._collWorld;
  const n   = pointsObj._collSampleCount;
  for (let i = 0; i < n; i++) {
    const x = src[i*3], y = src[i*3+1], z = src[i*3+2];
    _collPoint.set(
      m[0]*x + m[4]*y + m[8]*z  + m[12],
      m[1]*x + m[5]*y + m[9]*z  + m[13],
      m[2]*x + m[6]*y + m[10]*z + m[14],
    );
    if (bvh.closestPointToPoint(_collPoint, {}, 0, POINT_CLOUD_COLLISION_THRESHOLD)) return true;
  }
  return false;
}

function _highlightObject(obj) {
  const mat = obj.material;
  if (mat.emissive) {
    saveOriginalEmissive(mat);
    mat.emissive.set(0xff2200);
    highlightedMaterials.add(mat);
  } else {
    // PointsMaterial — no emissive, tint colour red instead
    if (!materialOriginalColor.has(mat)) materialOriginalColor.set(mat, mat.color.clone());
    mat.color.set(0xff2200);
    highlightedPointMaterials.add(mat);
  }
}

function highlightCollisionMeshes(meshA, meshB) {
  _highlightObject(meshA);
  _highlightObject(meshB);
}

function testMeshPairCollision(meshA, meshB) {
  fastWorldAABB(meshA, _collBox1);
  fastWorldAABB(meshB, _collBox2);
  if (!_collBox1.intersectsBox(_collBox2)) return false;
  const bvhA = meshA.geometry.boundsTree;
  const bvhB = meshB.geometry.boundsTree;
  if (bvhA && bvhB) {
    _collMatrix.copy(meshA.matrixWorld).invert().multiply(meshB.matrixWorld);
    if (!bvhA.intersectsGeometry(meshB.geometry, _collMatrix)) return false;
  }
  return true;
}

let _collisionFrame = 0;
const COLLISION_THROTTLE = 6; // run every Nth frame

function checkCollisions() {
  if (!collisionEnabled) return;
  if (++_collisionFrame % COLLISION_THROTTLE !== 0) return;

  clearCollisionHighlights();

  const visibleSTLs = importedSTLs.filter(e => e.mesh.visible && !e.isPointCloud);
  const visiblePointClouds = importedSTLs.filter(e => e.mesh.visible && e.isPointCloud);

  // Separate parented (attached to robot) vs unparented (world) STLs
  const worldSTLs = visibleSTLs.filter(e => !e.parentLink);
  const parentedSTLs = visibleSTLs.filter(e => e.parentLink);

  // Build extended robot link data: original meshes + any parented STLs
  const extendedLinks = robotLinkMeshes.map(link => ({
    name: link.name,
    meshes: [...link.meshes],
    stlEntries: [],
  }));
  for (const stl of parentedSTLs) {
    const linkIdx = linkToJoint[stl.parentLink];
    if (linkIdx !== undefined) {
      const extLink = extendedLinks.find(l => l.name === stl.parentLink);
      if (extLink) {
        extLink.meshes.push(stl.mesh);
        extLink.stlEntries.push(stl);
      }
    }
  }

  const collisions = [];
  const hitPairs = new Set(); // avoid duplicate reports

  function addCollision(nameA, nameB, meshA, meshB) {
    const key = [nameA, nameB].sort().join('|');
    if (hitPairs.has(key)) return;
    hitPairs.add(key);
    collisions.push({ linkName: nameA, stlName: nameB });
    highlightCollisionMeshes(meshA, meshB);
  }

  // 1) World STLs vs all extended robot links (original robot meshes + parented STLs)
  for (const stlEntry of worldSTLs) {
    for (const link of extendedLinks) {
      for (const robotMesh of link.meshes) {
        if (testMeshPairCollision(stlEntry.mesh, robotMesh)) {
          addCollision(link.name, stlEntry.name, stlEntry.mesh, robotMesh);
          break;
        }
      }
    }
  }

  // 2) Parented STLs vs other robot links (not their own parent link)
  for (const stl of parentedSTLs) {
    for (const link of extendedLinks) {
      if (link.name === stl.parentLink) continue; // skip own link
      for (const robotMesh of link.meshes) {
        if (testMeshPairCollision(stl.mesh, robotMesh)) {
          addCollision(link.name, stl.name, stl.mesh, robotMesh);
          break;
        }
      }
    }
  }

  // 3) Point clouds vs all robot link meshes
  for (const pc of visiblePointClouds) {
    for (const link of extendedLinks) {
      for (const robotMesh of link.meshes) {
        if (testPointCloudCollision(pc.mesh, robotMesh)) {
          addCollision(link.name, pc.name, pc.mesh, robotMesh);
          break;
        }
      }
    }
  }

  // 4) Robot link vs robot link (including parented STLs extending each link)
  for (let i = 0; i < extendedLinks.length; i++) {
    for (let j = i + 1; j < extendedLinks.length; j++) {
      const linkA = extendedLinks[i];
      const linkB = extendedLinks[j];
      if (areLinksAdjacent(linkA.name, linkB.name)) continue; // skip kinematically adjacent
      let found = false;
      for (const meshA of linkA.meshes) {
        for (const meshB of linkB.meshes) {
          if (testMeshPairCollision(meshA, meshB)) {
            addCollision(linkA.name, linkB.name, meshA, meshB);
            found = true;
            break;
          }
        }
        if (found) break;
      }
    }
  }

  // Update UI
  const parent = collisionInfoEl;
  while (parent.children.length > 0 && parent.lastChild !== collisionTextEl &&
         parent.lastChild.classList && parent.lastChild.classList.contains('collision-pair')) {
    parent.lastChild.remove();
  }

  lastCollisions = collisions;

  if (collisions.length > 0) {
    collisionInfoEl.classList.add('hit');
    collisionTextEl.textContent = `${collisions.length} collision${collisions.length > 1 ? 's' : ''}`;
    for (const c of collisions) {
      const span = document.createElement('span');
      span.className = 'collision-pair';
      span.textContent = `${c.linkName} \u2194 ${c.stlName}`;
      parent.appendChild(span);
    }
  } else {
    collisionInfoEl.classList.remove('hit');
    collisionTextEl.textContent = 'none';
  }
}

// ============================================================
// Render loop
// ============================================================
const eePosEl = document.getElementById('eePos');
const tgtPosEl = document.getElementById('tgtPos');
const ikErrEl = document.getElementById('ikErr');

function fmtV(v) {
  // Z-up: display X=three.x, Y=three.z, Z=three.y
  return `(${(v.x*1000).toFixed(1)}, ${(v.z*1000).toFixed(1)}, ${(v.y*1000).toFixed(1)})mm`;
}

function animate() {
  requestAnimationFrame(animate);

  if (ikMode) {
    // Run IK solver toward the target
    const err = solveIK(ikTarget.position, ikTargetQuat, 10, 0.00005);
    updateSliders();

    // Update line from EE to target
    const eePos = getEEWorldPosition();
    const pts = ikLine.geometry.attributes.position;
    pts.setXYZ(0, eePos.x, eePos.y, eePos.z);
    pts.setXYZ(1, ikTarget.position.x, ikTarget.position.y, ikTarget.position.z);
    pts.needsUpdate = true;

    eePosEl.textContent = fmtV(eePos);
    tgtPosEl.textContent = fmtV(ikTarget.position);
    ikErrEl.textContent = (err * 1000).toFixed(2) + 'mm';

    // Keep IK sliders in sync when target is dragged via gizmo
    syncIKSliders();
  } else {
    const eePos = getEEWorldPosition();
    eePosEl.textContent = fmtV(eePos);
    tgtPosEl.textContent = '-';
    ikErrEl.textContent = '-';
  }

  if (chainVisible) updateChain();

  checkCollisions();

  // Camera snap animation
  if (snapAnim) {
    snapAnim.t = Math.min(1, snapAnim.t + snapClock.getDelta() / 0.4);
    const t = easeNavSnap(snapAnim.t);
    activeCamera.position.lerpVectors(snapAnim.sp, snapAnim.ep, t);
    activeCamera.up.lerpVectors(snapAnim.su, snapAnim.eu, t).normalize();
    if (snapAnim.t >= 1) {
      snapAnim = null; orbitControls.enabled = true;
      if (orthoOn) updateOrthoFrustum();
    }
  } else {
    snapClock.getDelta(); // keep clock ticking
  }

  orbitControls.update();
  renderer.render(scene, activeCamera);
  labelRenderer.render(scene, activeCamera);
  renderNavGizmo();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  if (orthoOn) updateOrthoFrustum();
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
});

// ============================================================
// WebSocket API — two-way remote control
// ============================================================
const wsDot = document.getElementById('ws-dot');
const wsText = document.getElementById('ws-text');
let ws = null;
let wsReconnectTimer = null;

function wsSetStatus(state) {
  wsDot.className = 'dot ' + (state === 'on' ? 'on' : state === 'err' ? 'err' : 'off');
  wsText.textContent = state === 'on' ? 'API: connected' :
                        state === 'err' ? 'API: error' : 'API: not connected';
}

function buildState() {
  scene.updateMatrixWorld(true);
  const eePos = getEEWorldPosition();
  const eeQuat = getEEWorldQuaternion();
  const euler = new THREE.Euler().setFromQuaternion(eeQuat, 'YZX');
  return {
    type: 'state',
    joints: jointAngles.map((a, i) => +(apiSign[i] * a * rad2deg).toFixed(2)),
    // Z-up: X=three.x, Y=three.z, Z=three.y
    eePosition: [+(eePos.x * 1000).toFixed(2), +(eePos.z * 1000).toFixed(2), +(eePos.y * 1000).toFixed(2)],
    eeOrientation: [+(euler.y * rad2deg).toFixed(2), +(euler.z * rad2deg).toFixed(2), +(euler.x * rad2deg).toFixed(2)],
    mode: ikMode ? 'IK' : 'FK',
    ikError: ikMode ? +((getEEWorldPosition().distanceTo(ikTarget.position)) * 1000).toFixed(3) : null,
    collisionEnabled,
    collision: collisionEnabled && lastCollisions.length > 0,
    collisions: collisionEnabled ? lastCollisions.map(c => ({ link: c.linkName, object: c.stlName })) : [],
    ...(isKappaGeometry ? { chi: +((kappaSignPositive ? 1 : -1) * kappaToEuler(jointAngles[kappaJointIdx] * rad2deg).chi).toFixed(2) } : {}),
  };
}

function wsSend(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function handleCommand(data) {
  const cmd = data.cmd;
  if (!cmd) return;

  if (cmd === 'getState') {
    wsSend(buildState());

  } else if (cmd === 'setJoints') {
    const angles = data.angles;
    if (Array.isArray(angles) && angles.length === numJoints) {
      for (let i = 0; i < numJoints; i++) jointAngles[i] = apiSign[i] * angles[i] * deg2rad;
      clampJoints();
      updateFK();
      updateSliders();
      if (ikMode) {
        scene.updateMatrixWorld(true);
        ikTarget.position.copy(getEEWorldPosition());
        ikTargetQuat.copy(getEEWorldQuaternion());
        ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
        syncIKSliders();
      }
      wsSend(buildState());
    }

  } else if (cmd === 'home') {
    for (let i = 0; i < numJoints; i++) jointAngles[i] = 0;
    updateFK();
    updateSliders();
    if (ikMode) {
      scene.updateMatrixWorld(true);
      ikTarget.position.copy(getEEWorldPosition());
      ikTargetQuat.copy(getEEWorldQuaternion());
      ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
      syncIKSliders();
    }
    wsSend(buildState());

  } else if (cmd === 'setSingleJoint') {
    const idx = data.index;
    const angle = data.angle;
    if (idx >= 0 && idx < numJoints && typeof angle === 'number') {
      jointAngles[idx] = apiSign[idx] * angle * deg2rad;
      clampJoints();
      updateFK();
      updateSliders();
      if (ikMode) {
        scene.updateMatrixWorld(true);
        ikTarget.position.copy(getEEWorldPosition());
        ikTargetQuat.copy(getEEWorldQuaternion());
        ikTargetEuler.setFromQuaternion(ikTargetQuat, 'YZX');
        syncIKSliders();
      }
      wsSend(buildState());
    }

  } else if (cmd === 'setMode') {
    if (data.mode === 'FK' || data.mode === 'IK') {
      setIKMode(data.mode === 'IK');
      wsSend(buildState());
    }

  } else if (cmd === 'setIKTarget') {
    applyIKTarget(data);
    wsSend(buildState());

  } else if (cmd === 'moveTo') {
    if (!ikMode) setIKMode(true);
    applyIKTarget(data);
    wsSend(buildState());

  } else if (cmd === 'setCollision') {
    const on = data.enabled !== undefined ? !!data.enabled : !collisionEnabled;
    if (on !== collisionEnabled) {
      collisionEnabled = on;
      collisionBtn.textContent = `Collision: ${on ? 'ON' : 'OFF'}`;
      collisionBtn.classList.toggle('active', on);
      collisionInfoEl.style.display = on ? 'block' : 'none';
      if (!on) clearCollisionHighlights();
    }
    wsSend(buildState());

  } else if (cmd === 'getCollisions') {
    wsSend({
      type: 'collisions',
      enabled: collisionEnabled,
      collision: collisionEnabled && lastCollisions.length > 0,
      pairs: collisionEnabled ? lastCollisions.map(c => ({ link: c.linkName, object: c.stlName })) : [],
    });

  } else if (cmd === 'listObjects') {
    wsSend({
      type: 'objects',
      objects: importedSTLs.map((e, i) => buildObjectInfo(e, i)),
    });

  } else if (cmd === 'setObject') {
    const entry = findSTLEntry(data);
    if (!entry) {
      wsSend({ type: 'error', error: 'Object not found. Use listObjects to see available objects.' });
      return;
    }
    const m = entry.mesh;
    if (Array.isArray(data.position) && data.position.length === 3) {
      // Z-up: [x, y, z] → Three.js: x=x, y=z, z=y (mm → meters)
      m.position.set(data.position[0] / 1000, data.position[2] / 1000, data.position[1] / 1000);
    }
    if (Array.isArray(data.rotation) && data.rotation.length === 3) {
      // Z-up Euler [rx, ry, rz] degrees → Three.js: x=rx, y=rz, z=ry
      m.rotation.set(
        data.rotation[0] * deg2rad,
        data.rotation[2] * deg2rad,
        data.rotation[1] * deg2rad
      );
    }
    if (data.scale !== undefined) {
      if (Array.isArray(data.scale) && data.scale.length === 3) {
        m.scale.set(data.scale[0], data.scale[1], data.scale[2]);
      } else if (typeof data.scale === 'number') {
        m.scale.setScalar(data.scale);
      }
    }
    if (typeof data.name === 'string' && data.name.trim()) {
      entry.name = data.name.trim();
      entry.label.element.textContent = entry.name;
    }
    if (data.visible !== undefined) {
      m.visible = !!data.visible;
    }
    const idx = importedSTLs.indexOf(entry);
    wsSend({ type: 'object', ...buildObjectInfo(entry, idx) });
    saveSTLDebounced(entry);

  } else if (cmd === 'getObject') {
    const entry = findSTLEntry(data);
    if (!entry) {
      wsSend({ type: 'error', error: 'Object not found. Use listObjects to see available objects.' });
      return;
    }
    const idx = importedSTLs.indexOf(entry);
    wsSend({ type: 'object', ...buildObjectInfo(entry, idx) });

  } else if (cmd === 'resetObjectRotation') {
    const entry = findSTLEntry(data);
    if (!entry) {
      wsSend({ type: 'error', error: 'Object not found. Use listObjects to see available objects.' });
      return;
    }
    entry.mesh.rotation.set(0, 0, 0);
    const idx = importedSTLs.indexOf(entry);
    wsSend({ type: 'object', ...buildObjectInfo(entry, idx) });
    saveSTLDebounced(entry);

  } else if (cmd === 'setChi') {
    if (isKappaGeometry && typeof data.angle === 'number') {
      const chiSlider = document.getElementById('chiSlider');
      chiSlider.value = data.angle;
      chiSlider.dispatchEvent(new Event('input'));
      wsSend(buildState());
    }

  } else if (cmd === 'resetObjectScale') {
    const entry = findSTLEntry(data);
    if (!entry) {
      wsSend({ type: 'error', error: 'Object not found. Use listObjects to see available objects.' });
      return;
    }
    entry.mesh.scale.set(1, 1, 1);
    const idx = importedSTLs.indexOf(entry);
    wsSend({ type: 'object', ...buildObjectInfo(entry, idx) });
    saveSTLDebounced(entry);
  }
}

function findSTLEntry(data) {
  if (typeof data.index === 'number') {
    return importedSTLs[data.index] || null;
  }
  if (typeof data.name === 'string') {
    return importedSTLs.find(e => e.name === data.name) || null;
  }
  if (typeof data.object === 'string') {
    return importedSTLs.find(e => e.name === data.object) || null;
  }
  return null;
}

function buildObjectInfo(entry, index) {
  const p = entry.mesh.position;
  const r = entry.mesh.rotation;
  const s = entry.mesh.scale;
  return {
    index,
    name: entry.name,
    // Z-up: X=three.x, Y=three.z, Z=three.y (meters → mm)
    position: [+(p.x * 1000).toFixed(2), +(p.z * 1000).toFixed(2), +(p.y * 1000).toFixed(2)],
    // Z-up Euler: rx=three.x, ry=three.z, rz=three.y (rad → deg)
    rotation: [+(r.x * rad2deg).toFixed(2), +(r.z * rad2deg).toFixed(2), +(r.y * rad2deg).toFixed(2)],
    scale: [+s.x.toFixed(4), +s.y.toFixed(4), +s.z.toFixed(4)],
    visible: entry.mesh.visible,
  };
}

function applyIKTarget(data) {
  if (Array.isArray(data.position) && data.position.length === 3) {
    // Z-up input: [x, y, z] → Three.js: x=x, y=z, z=y
    ikTarget.position.set(data.position[0] / 1000, data.position[2] / 1000, data.position[1] / 1000);
  }
  if (Array.isArray(data.orientation) && data.orientation.length === 3) {
    // Z-up Euler [α,β,γ] → Three.js YZX: y=α, z=β, x=γ
    ikTargetEuler.set(data.orientation[2] * deg2rad, data.orientation[0] * deg2rad, data.orientation[1] * deg2rad, 'YZX');
    ikTargetQuat.setFromEuler(ikTargetEuler);
  }
  syncIKSliders();
}

function wsConnect() {
  // Only connect via WebSocket if served from a server (not file://)
  if (location.protocol === 'file:') return;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws?role=viewer`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    wsSetStatus('on');
    console.log('WebSocket connected');
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleCommand(data);
    } catch (e) {
      console.warn('WS bad message:', e);
    }
  };

  ws.onclose = () => {
    wsSetStatus('off');
    ws = null;
    // Reconnect after 2 seconds
    wsReconnectTimer = setTimeout(wsConnect, 2000);
  };

  ws.onerror = () => {
    wsSetStatus('err');
  };
}

// Start WebSocket connection
wsConnect();
</script>
