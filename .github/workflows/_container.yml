name: Container

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: If true, push image to container registry

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: inputs.publish
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: tag_for_testing
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test server starts and /healthz responds
        run: |
          docker run -d --name test-robot -p 8080:8080 tag_for_testing
          sleep 3
          curl --fail http://localhost:8080/healthz
          docker rm -f test-robot

      - name: Create image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Push image to registry
        if: inputs.publish && github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
